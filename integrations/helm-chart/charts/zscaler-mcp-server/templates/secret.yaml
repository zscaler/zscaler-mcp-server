{{- if .Values.secret.create -}}
{{- $v := .Values.secret.values -}}
{{- $keys := .Values.secret.envKeys -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zscaler-mcp-server.secretName" . }}
  labels:
    {{- include "zscaler-mcp-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $v.clientId }}
  {{ $keys.clientId }}: {{ $v.clientId | quote }}
  {{- end }}
  {{- if $v.clientSecret }}
  {{ $keys.clientSecret }}: {{ $v.clientSecret | quote }}
  {{- end }}
  {{- if $v.vanityDomain }}
  {{ $keys.vanityDomain }}: {{ $v.vanityDomain | quote }}
  {{- end }}
  {{- if $v.customerId }}
  {{ $keys.customerId }}: {{ $v.customerId | quote }}
  {{- end }}
  {{- if $v.privateKey }}
  {{ $keys.privateKey }}: |
{{ $v.privateKey | indent 4 }}
  {{- end }}
  {{- if $v.apiKey }}
  {{ $keys.apiKey }}: {{ $v.apiKey | quote }}
  {{- end }}
{{- end }}
