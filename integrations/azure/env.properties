# ─────────────────────────────────────────────────────────────────────────
# Zscaler MCP Server — Azure Deployment Configuration
# ─────────────────────────────────────────────────────────────────────────
# Optional: provide this file via the interactive deployment script.
# If not provided, the script will prompt you for each value.
#
#   python azure_mcp_operations.py deploy
# ─────────────────────────────────────────────────────────────────────────

# ── Zscaler OneAPI Credentials (required) ────────────────────────────────
# Obtain from ZIdentity console → Administration → API Keys
ZSCALER_CLIENT_ID=NOT_SET
ZSCALER_CLIENT_SECRET=NOT_SET
ZSCALER_VANITY_DOMAIN=NOT_SET
ZSCALER_CUSTOMER_ID=NOT_SET
ZSCALER_CLOUD=production

# ── Auth0 / OIDC Provider (for OIDCProxy auth mode only) ────────────────
# Create an Auth0 application for OAuth 2.1 + DCR authentication.
# Only needed if you select "OIDCProxy" as the auth mode.
# AUTH0_DOMAIN=NOT_SET
# AUTH0_CLIENT_ID=NOT_SET
# AUTH0_CLIENT_SECRET=NOT_SET
# AUTH0_AUDIENCE=zscaler-mcp-server

# ── JWT Auth (for JWT auth mode only) ────────────────────────────────────
# ZSCALER_MCP_AUTH_JWKS_URI=https://your-idp/.well-known/jwks.json
# ZSCALER_MCP_AUTH_ISSUER=https://your-idp/
# ZSCALER_MCP_AUTH_AUDIENCE=zscaler-mcp-server

# ── API Key Auth (for API Key auth mode only) ────────────────────────────
# Leave blank to auto-generate a secure key during deployment.
# ZSCALER_MCP_AUTH_API_KEY=

# ── Azure Infrastructure (optional — defaults are auto-generated) ────────
# AZURE_RESOURCE_GROUP=zscaler-mcp-rg
# AZURE_LOCATION=eastus
# AZURE_KEYVAULT_NAME=zscaler-mcp-kv

# ── Container Apps specific ──────────────────────────────────────────────
# AZURE_CONTAINER_APP=zscaler-mcp

# ── VM specific ──────────────────────────────────────────────────────────
# AZURE_VM_NAME=zscaler-mcp-vm

# ── MCP Server Settings (optional) ──────────────────────────────────────
# MCP_PORT=8000
# ZSCALER_MCP_DISABLED_SERVICES=zcc,zdx
# ZSCALER_MCP_DISABLED_TOOLS=zcc_*
# ZSCALER_MCP_WRITE_ENABLED=true
# ZSCALER_MCP_WRITE_TOOLS=zpa_create_*,zia_update_*

# ── Azure AI Foundry (for agent_create command) ────────────────────────
# Create a Foundry project at https://ai.azure.com
# The project endpoint format: https://{resource}.services.ai.azure.com/api/projects/{project}
# Find it in Foundry portal → Project Overview → "Microsoft Foundry project endpoint"
# AZURE_AI_PROJECT_ENDPOINT=NOT_SET
# AZURE_OPENAI_MODEL=gpt-4o
#
# Foundry "Custom keys" connection that holds the MCP server auth headers.
# Create it once in the portal:
#   Project → Management center → Connected resources → + New connection
#   → Custom keys → name it (matching the value below) → add header rows.
# For zscaler auth: keys X-Zscaler-Client-ID + X-Zscaler-Client-Secret
# For api-key auth: key X-MCP-API-Key
# AZURE_FOUNDRY_CONNECTION_NAME=zscaler-mcp-headers
