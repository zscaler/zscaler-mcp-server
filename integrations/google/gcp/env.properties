# GCP Deployment Configuration
# Copy this file to .env and update the values before deploying.

# ── GCP Configuration ─────────────────────────────────────────────────
GCP_PROJECT_ID=NOT_SET
GCP_REGION=us-central1
GCP_ZONE=us-central1-a

# ── Zscaler OneAPI Credentials ────────────────────────────────────────
ZSCALER_CLIENT_ID=NOT_SET
ZSCALER_CLIENT_SECRET=NOT_SET
ZSCALER_VANITY_DOMAIN=NOT_SET
ZSCALER_CUSTOMER_ID=NOT_SET
ZSCALER_CLOUD=production

# ── MCP Client Authentication ────────────────────────────────────────
# Supported modes: jwt, api-key, zscaler, none
# The deploy script prompts interactively — these are used if present.

# JWT mode
#ZSCALER_MCP_AUTH_JWKS_URI=https://your-idp/.well-known/jwks.json
#ZSCALER_MCP_AUTH_ISSUER=https://your-idp/
#ZSCALER_MCP_AUTH_AUDIENCE=zscaler-mcp-server

# API Key mode
#ZSCALER_MCP_AUTH_API_KEY=your-secret-key

# ── Optional MCP Configuration ───────────────────────────────────────
# Comma-separated services to enable (empty = all)
ZSCALER_MCP_SERVICES=
# Enable write tools (true/false)
ZSCALER_MCP_WRITE_ENABLED=
# Comma-separated write tool patterns to allow (e.g., zpa_*,zia_*)
ZSCALER_MCP_WRITE_TOOLS=
# Comma-separated services to disable (e.g., zcc,zdx)
ZSCALER_MCP_DISABLED_SERVICES=
# Comma-separated tool patterns to disable (e.g., zcc_*,zia_list_device*)
ZSCALER_MCP_DISABLED_TOOLS=
