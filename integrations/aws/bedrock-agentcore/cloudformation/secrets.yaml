AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Zscaler MCP Server — Secrets Manager nested stack. Creates a single
  KMS-encrypted Secret holding Zscaler OneAPI credentials. Only invoked
  when the root stack's CredentialSource=CreateNew. For production we
  strongly recommend CredentialSource=UseExisting (don't put credentials
  in CloudFormation parameters).

Parameters:

  ResourceNamePrefix:
    Type: String
  ZscalerClientId:
    Type: String
    NoEcho: true
  ZscalerClientSecret:
    Type: String
    NoEcho: true
  ZscalerVanityDomain:
    Type: String
  ZscalerCustomerId:
    Type: String
  ZscalerCloud:
    Type: String

Resources:

  ZscalerCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${ResourceNamePrefix}/credentials
      Description: >-
        Zscaler OneAPI credentials consumed by the Zscaler MCP Server
        container at startup. Always KMS-encrypted at rest.
      KmsKeyId: alias/aws/secretsmanager
      SecretString: !Sub |
        {
          "ZSCALER_CLIENT_ID":      "${ZscalerClientId}",
          "ZSCALER_CLIENT_SECRET":  "${ZscalerClientSecret}",
          "ZSCALER_VANITY_DOMAIN":  "${ZscalerVanityDomain}",
          "ZSCALER_CUSTOMER_ID":    "${ZscalerCustomerId}",
          "ZSCALER_CLOUD":          "${ZscalerCloud}"
        }
      Tags:
        - Key: Application
          Value: zscaler-mcp-server
        - Key: ManagedBy
          Value: cloudformation

Outputs:

  SecretName:
    Description: Friendly name of the Secrets Manager secret.
    Value: !Ref ZscalerCredentialsSecret
  SecretArn:
    Description: ARN of the Secrets Manager secret.
    Value: !Ref ZscalerCredentialsSecret
