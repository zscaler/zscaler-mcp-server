# =========================================================================
# Zscaler MCP Server — AWS Bedrock AgentCore Deployment Configuration
# =========================================================================
# Optional: provide this file via the interactive deployment script.
# If not provided, the script will prompt you for each value.
#
#   python aws_mcp_operations.py deploy --env-file env.properties
#
# All variables are also overridable via the script's interactive prompts.
#
# Layout:
#   1. REQUIRED       — bare-minimum settings every deployment needs
#   2. OPTIONAL       — sensible defaults, override only when needed
#   3. AUTHENTICATION — pick one block, matching your ZSCALER_MCP_AUTH_MODE
#   4. EXPERIMENTAL   — AgentCore Gateway (opt-in; partial tool discovery)
#   5. NETWORK MODE   — PUBLIC (default) or VPC (private-resource access)
#   6. INTERNAL       — set by the deploy script; documented for transparency
# =========================================================================


# =========================================================================
# 1. REQUIRED
# =========================================================================
# Zscaler OneAPI credentials from ZIdentity → Administration → API Keys.
# Two delivery modes (the script asks which one):
#   1. Reuse an existing Secrets Manager secret → only ZSCALER_SECRET_NAME
#   2. Create a new secret from the values below at deploy time
ZSCALER_CLIENT_ID=NOT_SET
ZSCALER_CLIENT_SECRET=NOT_SET
ZSCALER_VANITY_DOMAIN=NOT_SET
ZSCALER_CUSTOMER_ID=NOT_SET

# Pre-existing Secrets Manager secret name (recommended for production).
# Leave blank to have the deploy create a new secret from the values above.
# ZSCALER_SECRET_NAME=zscaler/mcp/credentials


# =========================================================================
# 2. OPTIONAL — sensible defaults
# =========================================================================

# Zscaler cloud override. Leave as "production" unless you're on the Beta
# tenant (then set "beta"). Other values are rarely needed.
ZSCALER_CLOUD=production

# AWS deploy targets. Defaults work for most accounts.
AWS_REGION=us-east-1
AWS_STACK_NAME=zscaler-mcp-agentcore
AWS_RESOURCE_NAME_PREFIX=zscaler-mcp

# S3 bucket the deploy uses for nested CFN templates. Auto-created if it
# doesn't exist. Leave blank → script generates "zscaler-mcp-cfn-<acct>-<rgn>".
# AWS_ASSET_BUCKET=

# Container image. By default the deploy pulls the official AWS Marketplace
# image and tracks the supported "<semver>-bedrock" tag internally. Override
# only when you need to pin an older tag, mirror to a private ECR, or test
# a development build. Any non-empty value here takes precedence.
# ZSCALER_MCP_IMAGE_URI=709825985650.dkr.ecr.us-east-1.amazonaws.com/zscaler/zscaler-mcp-server:0.10.4-bedrock

# MCP feature flags. Read-only by default — enable writes + an explicit
# allowlist when you need create/update/delete operations.
ZSCALER_MCP_WRITE_ENABLED=false
# ZSCALER_MCP_WRITE_TOOLS=zpa_create_*,zia_update_*
# ZSCALER_MCP_DISABLED_TOOLS=zcc_*
# ZSCALER_MCP_DISABLED_SERVICES=zcc,zdx

# Audit every tool call to CloudWatch. Recommended on for production.
ZSCALER_MCP_LOG_TOOL_CALLS=true


# =========================================================================
# 3. AUTHENTICATION — pick ONE block matching ZSCALER_MCP_AUTH_MODE
# =========================================================================
# Modes: jwt | zscaler | api-key | none
#
# Recommendation:
#   - zscaler  → simplest for evaluation. The container validates incoming
#                X-Zscaler-Client-ID / X-Zscaler-Client-Secret headers
#                against Zscaler's /oauth2/v1/token endpoint. No external IdP.
#   - jwt      → production multi-tenant; lets callers present a real
#                IdP-issued bearer. Required when fronting with the
#                experimental AgentCore Gateway.
#   - api-key  → simple shared-secret model for service-to-service.
#   - none     → AWS IAM is the only auth boundary (InvokeAgentRuntime
#                permission). Internal/development only.
ZSCALER_MCP_AUTH_MODE=zscaler

# ── JWT mode ─────────────────────────────────────────────────────────────
# Required when ZSCALER_MCP_AUTH_MODE=jwt. The same values drive both the
# container's JWT validator and AgentCore Identity's customJwtAuthorizer.
# ZSCALER_MCP_AUTH_JWKS_URI=https://your-tenant.us.auth0.com/.well-known/jwks.json
# ZSCALER_MCP_AUTH_ISSUER=https://your-tenant.us.auth0.com/
# ZSCALER_MCP_AUTH_AUDIENCE=zscaler-mcp-server
#
# Optional JWT extras:
#   JWT_DISCOVERY_URL    — derived as "<issuer>/.well-known/openid-configuration"
#                          when blank. Override only for non-standard IdPs.
#   JWT_ALLOWED_CLIENTS  — comma-separated OAuth client_id allowlist enforced
#                          by AgentCore Identity (in addition to the container).
# ZSCALER_MCP_AUTH_JWT_DISCOVERY_URL=
# ZSCALER_MCP_AUTH_JWT_ALLOWED_CLIENTS=

# ── API-key mode ─────────────────────────────────────────────────────────
# Leave blank → the deploy auto-generates one. The container accepts the
# key via three transports:
#   1. Authorization: Bearer <key>
#   2. X-Api-Key: <key>           ← allowlisted by AgentCore Runtime
#   3. ZSCALER_MCP_AUTH_API_KEY env var (used as the AgentCore Sandbox fallback)
# ZSCALER_MCP_AUTH_API_KEY=


# =========================================================================
# 4. EXPERIMENTAL — AgentCore Gateway (opt-in)
# =========================================================================
# Status: experimental. End-to-end runtime invocation through the Gateway
# has been verified, but tools/list propagation through the Gateway target
# is currently inconsistent — downstream agent platforms may see a subset
# of tools (or none at all). Production deployments should keep this OFF
# and use the Direct Runtime path. See integrations/aws/bedrock-agentcore/README.md →
# "Experimental: AgentCore Gateway" for the current state of testing.
#
# When OFF (default), the Gateway nested stack is skipped entirely and the
# settings below are ignored.
ENABLE_AGENTCORE_GATEWAY=false

# Lifecycle mode (only consulted when ENABLE_AGENTCORE_GATEWAY=true):
#   create  → the deploy provisions a brand-new Gateway and registers the
#             runtime as an mcpServer target. Full lifecycle (incl. delete)
#             owned by this stack.
#   attach  → skip Gateway creation. Register the runtime as a target on a
#             Gateway you already operate. destroy only removes our target.
# GATEWAY_MODE=create

# Required when GATEWAY_MODE=attach.
# EXISTING_GATEWAY_ID=

# ── Gateway inbound auth (downstream agent → Gateway) ────────────────────
# Configures the Gateway's CUSTOM_JWT authorizer. Either discovery URL or
# issuer is required (issuer is appended with /.well-known/openid-configuration).
# Only consulted when GATEWAY_MODE=create.
# GATEWAY_INBOUND_DISCOVERY_URL=https://my-tenant.us.auth0.com/.well-known/openid-configuration
# GATEWAY_INBOUND_ISSUER=https://my-tenant.us.auth0.com/

# OAuth client_id(s) downstream agents present. Required. Comma-separated.
# GATEWAY_OAUTH_CLIENT_ID=

# Expected `aud` claim. Required unless GATEWAY_INBOUND_CLIENT_CLAIM_NAME
# is set (in which case the client-id custom-claim matcher gates instead).
# GATEWAY_INBOUND_ALLOWED_AUDIENCE=

# Required scope(s) — AND semantics. Also published in the Gateway's
# scopes_supported metadata, which IS required for Amazon Quick's MCP
# integration: when scopes_supported is empty Quick falls back to defaults
# (openid offline_access) that no M2M client carries.
# GATEWAY_INBOUND_ALLOWED_SCOPES=invoke:gateway

# Inbound JWT client-id claim name. AgentCore's allowedClients matcher
# reads `client_id` specifically — Cognito-native. Every other major OIDC
# IdP uses a different claim. The deploy auto-detects from the discovery
# URL; override only if detection picks wrong.
#   Cognito  → client_id   (default)
#   Auth0    → azp
#   Okta     → cid
#   Entra ID → azp (v2.0) or appid (v1.0)
#   Keycloak → azp
#   Google   → azp
# GATEWAY_INBOUND_CLIENT_CLAIM_NAME=

# ── Gateway outbound auth (Gateway → Runtime) ────────────────────────────
# AWS rejects JWT_PASSTHROUGH for MCP-server targets, so the Gateway must
# mint upstream tokens via an AgentCore Identity OAuth2 credential provider.
#
# Default path: leave GATEWAY_OAUTH_PROVIDER_ARN blank and supply
# GATEWAY_OAUTH_CLIENT_SECRET — the deploy auto-provisions a CustomOauth2
# provider with CLIENT_CREDENTIALS grant and tears it down on destroy.
# GATEWAY_OAUTH_CLIENT_SECRET=

# Alternative: reuse an existing provider. When set, auto-provisioning is
# skipped and GATEWAY_OAUTH_CLIENT_SECRET is ignored.
# GATEWAY_OAUTH_PROVIDER_ARN=arn:aws:bedrock-agentcore:us-east-1:123456789012:oauth2-credential-provider/...

# Optional overrides (rarely needed). Leave scopes blank unless your IdP
# actually defines them. Audiences are NOT scopes — for Auth0 the audience
# is bound via tenant-level Default Audience, not here.
# GATEWAY_OAUTH_PROVIDER_SCOPES=
# GATEWAY_OAUTH_PROVIDER_GRANT_TYPE=CLIENT_CREDENTIALS   # | AUTHORIZATION_CODE | TOKEN_EXCHANGE

# Escape hatch for IdP-specific token-endpoint quirks. AgentCore strips
# query strings before POSTing, so this is a no-op for `audience` on Auth0.
# Leave empty unless you know your IdP needs custom body params.
# GATEWAY_OAUTH_TOKEN_ENDPOINT_QUERY=

# Curated tool schema. Strongly recommended whenever you enable the
# Gateway: puts the target in SchemaUpfront mode and avoids the OAuth
# consent dance ImplicitSync needs. Generate via:
#   python aws_mcp_operations.py export-tool-schema --bearer <JWT> > tool-schema.json
# GATEWAY_TOOL_SCHEMA_FILE=tool-schema.json


# =========================================================================
# 5. NETWORK MODE — AgentCore Runtime VPC connectivity
# =========================================================================
# Controls where AgentCore Runtime places the container's elastic network
# interfaces (ENIs). Two modes:
#
#   PUBLIC (default)
#     AgentCore runs on its own managed network. Outbound internet works
#     out of the box, no VPC plumbing, no extra cost. Use this unless the
#     container needs to reach private resources.
#
#   VPC
#     AgentCore creates ENIs in subnets and security groups YOU own, so
#     the container can reach RDS, internal APIs, private Zscaler DNS,
#     etc. Constraints (read carefully — these are AWS-enforced):
#
#       1. Subnets MUST be in AgentCore-supported Availability Zones. The
#          full per-region AZ-ID table is at
#          https://docs.aws.amazon.com/bedrock-agentcore/latest/devguide/agentcore-vpc.html#supported-az
#          The deploy script bundles this table and rejects unsupported
#          subnets BEFORE launching the stack.
#       2. For outbound internet (required for Zscaler OneAPI calls):
#          place ENIs in PRIVATE subnets with a NAT gateway. Public
#          subnets do NOT provide internet to AgentCore.
#       3. >=2 subnets in different AZs is strongly recommended for HA.
#       4. First VPC-mode deploy in an account brings up the
#          AWSServiceRoleForBedrockAgentCoreNetwork service-linked role.
#          The IAM stack grants the narrow iam:CreateServiceLinkedRole
#          perm automatically when NetworkMode=VPC.
#
# Leave AGENTCORE_NETWORK_MODE unset (or set PUBLIC) to skip VPC entirely.
# AGENTCORE_NETWORK_MODE=PUBLIC

# ── VPC mode settings (only consulted when AGENTCORE_NETWORK_MODE=VPC) ──
#
# Notice there is NO required AGENTCORE_VPC_ID: subnet IDs and SG IDs
# are unique within an AWS account, so the subnet IDs you pick already
# encode the VPC they belong to. The deploy script resolves the VPC by
# calling ec2:DescribeSubnets on what you pass, and hard-fails before
# launching the stack if the subnets and security groups don't all live
# in ONE common VPC (AgentCore would reject the call, but five minutes
# later — failing here is much cheaper).
#
# Comma-separated subnet IDs. Two AWS-enforced constraints:
#   1. All subnets must be in the same VPC as the security groups below.
#   2. All subnets must be in AgentCore-supported AZ IDs for the region.
# Both are validated by the deploy script via ec2:DescribeSubnets BEFORE
# the stack is launched. Bad selections hard-fail with the resolved VPC
# IDs (for #1) and the supported AZ IDs (for #2).
# AGENTCORE_VPC_SUBNETS=subnet-0123abcd,subnet-0456efgh

# Comma-separated security group IDs. Must belong to the same VPC as
# the subnets above. Outbound rules must allow whichever private
# resources the container will talk to, plus 443/tcp to the public
# Zscaler OneAPI endpoint if you need outbound internet (and the
# subnets above must be PRIVATE with a NAT gateway route — public
# subnets don't give AgentCore internet access).
# AGENTCORE_VPC_SECURITY_GROUPS=sg-0123abcd

# Optional sanity check. When set, the script asserts every subnet and
# every SG above resolves to THIS VPC ID — typo guard. Also doubles as
# a pre-filter for the interactive picker: the VPC selection step is
# skipped and the picker jumps straight to the subnets in this VPC.
# AGENTCORE_VPC_ID=vpc-0123abcd

# ── PrivateLink endpoint (NOT provisioned by this script) ───────────────
# If you also want your callers (EC2, Lambda, ECS) to reach AgentCore's
# control- and data-plane APIs without going over the public internet,
# add a VPC Interface Endpoint to YOUR caller VPC pointing at
#   com.amazonaws.<region>.bedrock-agentcore
# This is a separate concern from the NetworkMode above (which controls
# the runtime's OWN network placement). See the README's "VPC
# connectivity" section for the one-liner aws ec2 create-vpc-endpoint
# command.


# =========================================================================
# 6. INTERNAL — DO NOT SET MANUALLY
# =========================================================================
# These are documented for transparency only. The deploy script (via the
# runtime provisioner Lambda) and the container image set them
# automatically; setting them yourself in this file either gets overwritten
# at deploy time or breaks the deployment. They map directly to behaviour
# the AgentCore Runtime topology requires.
#
#   FASTMCP_STATELESS_HTTP=true
#       Set in the Dockerfile. AgentCore Runtime replicas are ephemeral
#       and may be replaced between requests; FastMCP must run stateless
#       so sessions don't pin to a dead replica.
#
#   ZSCALER_MCP_ALLOW_HTTP=true
#       Set by runtime_provisioner.py. AgentCore terminates TLS upstream
#       of the container, so the inner HTTP server runs plain HTTP.
#
#   ZSCALER_MCP_DISABLE_HOST_VALIDATION=true
#       Set by runtime_provisioner.py. AgentCore is the sole ingress and
#       has already authenticated/authorized the request before forwarding.
#       The internal Host header AgentCore sends is unpredictable for an
#       inner allowlist; enabling host validation would block all traffic.
#
#   ZSCALER_MCP_AUTH_ENABLED=true/false
#       Set by runtime_provisioner.py. Derived from ZSCALER_MCP_AUTH_MODE
#       (true for jwt/api-key/zscaler, false for none).
#
#   ZSCALER_MCP_TRANSPORT / ZSCALER_MCP_HOST / ZSCALER_MCP_PORT
#       Set via Dockerfile CMD args (streamable-http / 0.0.0.0 / 8000).
#       Required for AgentCore Runtime to forward MCP traffic correctly.
#
#   AWS_REGION
#       Injected by AgentCore at runtime. Used by the container's Secrets
#       Manager loader.
#
# Defense-in-depth toggles (not exposed by this template at all):
#   ZSCALER_MCP_DISABLE_OUTPUT_SANITIZATION
#   ZSCALER_MCP_DISABLE_ENTITLEMENT_FILTER
#   ZSCALER_MCP_SKIP_CONFIRMATIONS
#   ZSCALER_MCP_CONFIRMATION_TTL
# These remove security layers and should only be set for short-lived
# debugging. See the root project's CLAUDE.md for details.
