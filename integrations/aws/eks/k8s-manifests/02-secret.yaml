# K8s Secret holding the Zscaler creds. The orchestrator script reads the
# values out of AWS Secrets Manager (via boto3) at deploy time and renders
# this file with the base64-encoded values inline. Rotating the credentials
# is a `rotate-secrets` command on the orchestrator — fetches the latest
# from SM and re-applies this manifest.
#
# Rationale: the Secrets Store CSI driver path works too, but it requires
# installing a Helm chart + the AWS provider DaemonSet *before* anything
# else lands — a hard dependency that complicates the deploy flow. For
# zscaler-mcp-server's needs (5 string env vars consumed at process start)
# a managed K8s Secret with explicit `rotate` semantics is cleaner.
apiVersion: v1
kind: Secret
metadata:
  name: zscaler-mcp-creds
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: zscaler-mcp-server
    app.kubernetes.io/managed-by: eks-mcp-operations
type: Opaque
data:
  ZSCALER_CLIENT_ID:     ${B64_CLIENT_ID}
  ZSCALER_CLIENT_SECRET: ${B64_CLIENT_SECRET}
  ZSCALER_VANITY_DOMAIN: ${B64_VANITY_DOMAIN}
  ZSCALER_CUSTOMER_ID:   ${B64_CUSTOMER_ID}
  ZSCALER_CLOUD:         ${B64_CLOUD}
