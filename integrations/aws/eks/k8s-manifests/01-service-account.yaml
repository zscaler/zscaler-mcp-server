apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${SA_NAME}
  namespace: ${NAMESPACE}
  annotations:
    # IRSA — the cluster's OIDC IdP exchanges this SA's JWT for an STS
    # session bound to ${POD_ROLE_ARN}. The Pod can then read the secret.
    eks.amazonaws.com/role-arn: ${POD_ROLE_ARN}
  labels:
    app.kubernetes.io/name: zscaler-mcp-server
