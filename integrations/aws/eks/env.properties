# =========================================================================
# Zscaler MCP Server — AWS EKS Deployment Configuration
# =========================================================================
# Optional: provide this file via the interactive deployment script.
#
#   python eks_mcp_operations.py deploy --env-file env.properties
#
# Setting a value here pre-fills the prompt; leaving it unset triggers an
# interactive question.
# =========================================================================


# =========================================================================
# 1. REQUIRED
# =========================================================================
AWS_REGION=us-east-1
AWS_STACK_NAME=zscaler-mcp-eks
AWS_RESOURCE_NAME_PREFIX=zscaler-mcp


# =========================================================================
# 2. OPTIONAL — sensible defaults
# =========================================================================
# AWS_ASSET_BUCKET=
# MCP_SERVER_NAME=zscaler-mcp-aws-eks
#
# Container image. Defaults to the public Docker Hub image, which is
# published multi-arch (amd64 + arm64). EKS managed node groups default to
# LINUX/X86_64 nodes, so any custom override MUST include a linux/amd64
# variant or you'll get "exec format error" and CrashLoopBackoff.
#
# Build recipe for a multi-arch image (mirrors the published one):
#   docker buildx build --platform linux/amd64,linux/arm64 \
#       -t <your-ecr>/zscaler-mcp-server:dev --push .
#
# The deploy script runs an arch pre-flight check against ECR-hosted images
# and aborts before submitting CFN if it detects a single-arch arm64 push.
#
# ZSCALER_MCP_IMAGE_URI=zscaler/zscaler-mcp-server:latest


# =========================================================================
# 3. CLUSTER
# =========================================================================
# AWS_CLUSTER_MODE=CreateNew       # or UseExisting
# AWS_CLUSTER_NAME=zscaler-mcp-eks
# AWS_KUBE_VERSION=1.33   # defaults to 1.33 (lowest standard-support version)
# AWS_NODE_INSTANCE_TYPE=t3.medium
# AWS_NODE_DESIRED_COUNT=1
# AWS_NODE_MIN_COUNT=1
# AWS_NODE_MAX_COUNT=3
# AWS_NODE_DISK_SIZE=20


# =========================================================================
# 4. CREDENTIALS — Secrets Manager
# =========================================================================
# Reuse an existing SM secret (recommended for production):
# ZSCALER_SECRET_NAME=zscaler/mcp/credentials
# ZSCALER_SECRET_ARN=arn:aws:secretsmanager:us-east-1:...

# OR create a new one from the values below (dev/test):
ZSCALER_CLIENT_ID=NOT_SET
ZSCALER_CLIENT_SECRET=NOT_SET
ZSCALER_VANITY_DOMAIN=NOT_SET
ZSCALER_CUSTOMER_ID=NOT_SET
ZSCALER_CLOUD=production


# =========================================================================
# 5. NETWORK  (only used when AWS_CLUSTER_MODE=CreateNew)
# =========================================================================
# AWS_NETWORK_MODE=CreateNew       # or UseExisting
# AWS_VPC_CIDR=10.42.0.0/16
# AWS_VPC_ID=vpc-0123abcd
# AWS_PUBLIC_SUBNET_IDS=subnet-aaa,subnet-bbb
# AWS_PRIVATE_SUBNET_IDS=subnet-ccc,subnet-ddd


# =========================================================================
# 6. KUBERNETES
# =========================================================================
# AWS_K8S_NAMESPACE=zscaler-mcp
# AWS_K8S_SA_NAME=zscaler-mcp-sa
# AWS_REPLICAS=1


# =========================================================================
# 7. AUTHENTICATION
# =========================================================================
ZSCALER_MCP_AUTH_MODE=zscaler

# ── JWT mode ─────────────────────────────────────────────────────────────
# ZSCALER_MCP_AUTH_JWKS_URI=
# ZSCALER_MCP_AUTH_ISSUER=
# ZSCALER_MCP_AUTH_AUDIENCE=zscaler-mcp-server

# ── API-key mode ─────────────────────────────────────────────────────────
# ZSCALER_MCP_AUTH_API_KEY=

# ── OIDCProxy mode ───────────────────────────────────────────────────────
# OIDCPROXY_CLIENT_ID=
# OIDCPROXY_CLIENT_SECRET=
# OIDCPROXY_ISSUER=
# OIDCPROXY_AUDIENCE=


# =========================================================================
# 8. FEATURE FLAGS
# =========================================================================
ZSCALER_MCP_WRITE_ENABLED=false
# ZSCALER_MCP_WRITE_TOOLS=zpa_create_*,zia_update_*
# ZSCALER_MCP_DISABLED_TOOLS=
# ZSCALER_MCP_DISABLED_SERVICES=
# ZSCALER_MCP_TOOLSETS=default
# ZSCALER_MCP_DISABLED_TOOLSETS=
ZSCALER_MCP_LOG_TOOL_CALLS=true
