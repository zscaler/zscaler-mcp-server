AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Zscaler MCP Server on EKS — Network nested stack. Provisions a fresh VPC
  with two public subnets (for the ALB/NLB), two private subnets (for EKS
  worker nodes), an Internet Gateway, a single NAT gateway, and the route
  tables. Subnets are tagged for the AWS Load Balancer Controller so
  internet-facing Services land in the public subnets and internal services
  in the private ones. Only invoked when the root stack's
  NetworkMode=CreateNew.

Parameters:

  ResourceNamePrefix:
    Type: String
  VpcCidr:
    Type: String
    Default: 10.42.0.0/16
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/(8|16|17|18|19|20)$'
    ConstraintDescription: Must be a CIDR /20 or larger.
  ClusterName:
    Type: String

Resources:

  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - { Key: Name, Value: !Sub '${ResourceNamePrefix}-vpc' }
        - Key: !Sub kubernetes.io/cluster/${ClusterName}
          Value: shared

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - { Key: Name, Value: !Sub '${ResourceNamePrefix}-igw' }

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 4, 12]]
      MapPublicIpOnLaunch: true
      Tags:
        - { Key: Name, Value: !Sub '${ResourceNamePrefix}-public-a' }
        - { Key: kubernetes.io/role/elb, Value: '1' }
        - Key: !Sub kubernetes.io/cluster/${ClusterName}
          Value: shared

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 4, 12]]
      MapPublicIpOnLaunch: true
      Tags:
        - { Key: Name, Value: !Sub '${ResourceNamePrefix}-public-b' }
        - { Key: kubernetes.io/role/elb, Value: '1' }
        - Key: !Sub kubernetes.io/cluster/${ClusterName}
          Value: shared

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Select [2, !Cidr [!Ref VpcCidr, 4, 12]]
      MapPublicIpOnLaunch: false
      Tags:
        - { Key: Name, Value: !Sub '${ResourceNamePrefix}-private-a' }
        - { Key: kubernetes.io/role/internal-elb, Value: '1' }
        - Key: !Sub kubernetes.io/cluster/${ClusterName}
          Value: shared

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Select [3, !Cidr [!Ref VpcCidr, 4, 12]]
      MapPublicIpOnLaunch: false
      Tags:
        - { Key: Name, Value: !Sub '${ResourceNamePrefix}-private-b' }
        - { Key: kubernetes.io/role/internal-elb, Value: '1' }
        - Key: !Sub kubernetes.io/cluster/${ClusterName}
          Value: shared

  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - { Key: Name, Value: !Sub '${ResourceNamePrefix}-nat' }

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetA

  PublicSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetB

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnetA

  PrivateSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnetB

Outputs:

  VpcId:
    Value: !Ref Vpc
  PublicSubnetIds:
    Value: !Join [',', [!Ref PublicSubnetA, !Ref PublicSubnetB]]
  PrivateSubnetIds:
    Value: !Join [',', [!Ref PrivateSubnetA, !Ref PrivateSubnetB]]
