# =========================================================================
# Zscaler MCP Server — AWS ECS-Fargate Deployment Configuration
# =========================================================================
# Optional: provide this file via the interactive deployment script.
# If not provided, the script will prompt you for each value.
#
#   python ecs_fargate_mcp_operations.py deploy --env-file env.properties
#
# All variables are also overridable via the script's interactive prompts.
# Setting a value here pre-fills the prompt; leaving it unset triggers an
# interactive question.
#
# Sections:
#   1. REQUIRED        — bare-minimum settings every deployment needs
#   2. OPTIONAL        — sensible defaults, override only when needed
#   3. CREDENTIALS     — Secrets Manager (existing ARN OR create-new)
#   4. NETWORK         — VPC topology (existing OR create-new)
#   5. TLS             — ACM cert (managed via Route53, existing ARN, or none)
#   6. AUTHENTICATION  — MCP-client auth: zscaler | jwt | api-key | oidcproxy | none
#   7. FEATURE FLAGS   — write tools, disabled tools/services, toolset selection
#   8. CAPACITY        — task count, CPU, memory, log retention
# =========================================================================


# =========================================================================
# 1. REQUIRED
# =========================================================================
# AWS deploy targets. Defaults work for most accounts.
AWS_REGION=us-east-1
AWS_STACK_NAME=zscaler-mcp-ecs-fargate
AWS_RESOURCE_NAME_PREFIX=zscaler-mcp


# =========================================================================
# 2. OPTIONAL — sensible defaults
# =========================================================================
# Container image. Defaults to the public Docker Hub image, which is
# published as a multi-arch manifest list (amd64 + arm64) so Fargate's
# image-pull layer automatically selects the right CPU architecture.
#
# If you override this with a custom image (e.g. a private ECR mirror or
# a local build):
#
#   * The image MUST contain a linux/amd64 variant. Fargate defaults to
#     LINUX/X86_64; a single-arch arm64 image (the default output of
#     `docker build` on an M-series Mac) will exit 255 with
#     "exec /usr/local/bin/python: exec format error" within seconds.
#
#   * Recommended local-build recipe (multi-arch, like the published image):
#       docker buildx build --platform linux/amd64,linux/arm64 \
#           -t <your-ecr>/zscaler-mcp-server:dev --push .
#
#   * Recommended local-build recipe (amd64-only, faster but not portable):
#       docker buildx build --platform linux/amd64 \
#           -t <your-ecr>/zscaler-mcp-server:dev --push .
#
# The deploy script runs a pre-flight check against ECR-hosted images and
# aborts loudly if the manifest is single-arch arm64.
#
# ZSCALER_MCP_IMAGE_URI=zscaler/zscaler-mcp-server:latest

# S3 bucket the deploy uses for nested CFN templates. Auto-created if it
# doesn't exist. Leave blank → script generates "<prefix>-cfn-<acct>-<rgn>".
# AWS_ASSET_BUCKET=

# MCP server name registered into client configs. Defaults to
# "zscaler-mcp-aws-ecs"; pick a distinct one if you run multiple instances.
# MCP_SERVER_NAME=zscaler-mcp-aws-ecs


# =========================================================================
# 3. CREDENTIALS — Secrets Manager
# =========================================================================
# Two paths. Set ONE.
#
#   (a) Reuse an EXISTING Secrets Manager secret you've already populated
#       (RECOMMENDED for production):
#         ZSCALER_SECRET_NAME=zscaler/mcp/credentials
#
#       The secret must be a JSON object with these keys:
#         ZSCALER_CLIENT_ID, ZSCALER_CLIENT_SECRET, ZSCALER_VANITY_DOMAIN,
#         ZSCALER_CUSTOMER_ID, ZSCALER_CLOUD
#
#   (b) Create a NEW secret from the Zscaler creds below. Values appear in
#       the CloudFormation stack parameters during deploy — fine for dev/test,
#       not recommended for production.
# ZSCALER_SECRET_NAME=

# Required only when ZSCALER_SECRET_NAME is unset (CreateNew path):
ZSCALER_CLIENT_ID=NOT_SET
ZSCALER_CLIENT_SECRET=NOT_SET
ZSCALER_VANITY_DOMAIN=NOT_SET
ZSCALER_CUSTOMER_ID=NOT_SET
ZSCALER_CLOUD=production


# =========================================================================
# 4. NETWORK — VPC topology
# =========================================================================
# AWS_NETWORK_MODE picks one of:
#   CreateNew    — script provisions a fresh VPC: 2 public + 2 private subnets,
#                  IGW, single NAT gateway. Public subnets host the ALB; tasks
#                  run in the private subnets and reach Zscaler OneAPI via NAT.
#   UseExisting  — you point at an existing VPC + subnets you already operate.
#                  The interactive picker walks you through selecting them.
#
# Leave unset to be prompted.
# AWS_NETWORK_MODE=CreateNew

# Used only when AWS_NETWORK_MODE=CreateNew. Carved into four /20 subnets
# automatically. Must be at least /20.
AWS_VPC_CIDR=10.42.0.0/16

# Used only when AWS_NETWORK_MODE=UseExisting. All three required.
# AWS_VPC_ID=vpc-0123abcd
# AWS_PUBLIC_SUBNET_IDS=subnet-aaa,subnet-bbb
# AWS_PRIVATE_SUBNET_IDS=subnet-ccc,subnet-ddd


# =========================================================================
# 5. TLS — ACM certificate
# =========================================================================
# AWS_TLS_MODE picks one of:
#   AcmManaged   — script provisions a DNS-validated ACM cert against the
#                  Route53 zone you point at, then creates an alias A-record.
#                  This is the recommended production path.
#   AcmExisting  — attach an ACM cert you already have. Useful when DNS lives
#                  outside Route53 (you point your CNAME at the ALB yourself).
#   None         — ALB listens on plaintext HTTP only. Demo / PoC only.
#
# Leave unset to be prompted.
# AWS_TLS_MODE=AcmManaged

# Required when AWS_TLS_MODE=AcmManaged:
# AWS_HOSTED_ZONE_ID=Z0123456789ABCDEFGHIJ
# AWS_DOMAIN_NAME=zscaler-mcp.example.com

# Required when AWS_TLS_MODE=AcmExisting:
# AWS_CERT_ARN=arn:aws:acm:us-east-1:123456789012:certificate/abc...


# =========================================================================
# 6. AUTHENTICATION — MCP-client auth
# =========================================================================
# Modes: zscaler | jwt | api-key | oidcproxy | none
#
# Recommendation:
#   - zscaler   → simplest. Clients send HTTP Basic with ZSCALER_CLIENT_ID:
#                 ZSCALER_CLIENT_SECRET (the same creds you already configured
#                 in your .env). The MCP server validates them against
#                 Zscaler's /oauth2/v1/token endpoint and caches the result.
#                 No external IdP setup required.
#   - jwt       → production multi-tenant. Clients present an IdP-issued
#                 bearer; the MCP server validates via JWKS.
#   - api-key   → simple shared secret in `X-Api-Key`. Auto-generated by the
#                 deploy script if you don't set ZSCALER_MCP_AUTH_API_KEY.
#   - oidcproxy → full OAuth 2.1 with Dynamic Client Registration. Most
#                 elaborate. Requires an IdP you control (Auth0, Cognito, ...).
#   - none      → no MCP auth (cluster-internal only; ALB is the boundary).
ZSCALER_MCP_AUTH_MODE=zscaler

# ── JWT mode ─────────────────────────────────────────────────────────────
# ZSCALER_MCP_AUTH_JWKS_URI=https://your-tenant.us.auth0.com/.well-known/jwks.json
# ZSCALER_MCP_AUTH_ISSUER=https://your-tenant.us.auth0.com/
# ZSCALER_MCP_AUTH_AUDIENCE=zscaler-mcp-server

# ── API-key mode ─────────────────────────────────────────────────────────
# Leave blank to auto-generate at deploy time. Pre-set when you want a stable
# value across redeploys (e.g. for CI).
# ZSCALER_MCP_AUTH_API_KEY=

# ── OIDCProxy mode ───────────────────────────────────────────────────────
# OIDCPROXY_CLIENT_ID=
# OIDCPROXY_CLIENT_SECRET=
# OIDCPROXY_ISSUER=
# OIDCPROXY_AUDIENCE=


# =========================================================================
# 7. FEATURE FLAGS
# =========================================================================
# Write tools are disabled by default. Enable with an explicit allowlist.
ZSCALER_MCP_WRITE_ENABLED=false
# ZSCALER_MCP_WRITE_TOOLS=zpa_create_*,zia_update_*

# Exclude individual tools / services / toolsets at registration time.
# ZSCALER_MCP_DISABLED_TOOLS=zcc_*
# ZSCALER_MCP_DISABLED_SERVICES=zcc,zdx
# ZSCALER_MCP_TOOLSETS=default
# ZSCALER_MCP_DISABLED_TOOLSETS=zia_ssl_inspection

# Audit every tool call to CloudWatch. Recommended on for production.
ZSCALER_MCP_LOG_TOOL_CALLS=true


# =========================================================================
# 8. CAPACITY
# =========================================================================
# Desired task count. ALB target group handles per-target health-checks, so
# horizontal scaling is just bumping this number.
AWS_DESIRED_COUNT=1

# Fargate task size. Allowed CPU/memory combinations are constrained by AWS:
#   CPU 256  → memory 512 / 1024 / 2048
#   CPU 512  → memory 1024..4096 (1 GiB increments)
#   CPU 1024 → memory 2048..8192
#   CPU 2048 → memory 4096..16384
#   CPU 4096 → memory 8192..30720
# Defaults below are comfortably oversized for the MCP server.
AWS_TASK_CPU=512
AWS_TASK_MEMORY=1024

# CloudWatch log retention (days). Allowed values per AWS:
#   1, 3, 5, 7, 14, 30, 60, 90, 180, 365, 400, 545, 731, 1827, 3653
AWS_LOG_RETENTION_DAYS=14
