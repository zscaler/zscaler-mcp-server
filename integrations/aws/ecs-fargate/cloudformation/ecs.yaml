AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Zscaler MCP Server on ECS-Fargate — Workload nested stack. Provisions the
  ECS cluster, task definition, service, Application Load Balancer, target
  group, listeners, an optional ACM certificate (DNS-validated via Route53),
  and an optional Route53 alias record. Pulls the Zscaler MCP Server image
  from Docker Hub by default and feeds it env vars sourced from a Secrets
  Manager secret + a curated MCP-feature-flag set passed through from the
  root stack.

Parameters:

  ResourceNamePrefix:
    Type: String
  ImageUri:
    Type: String
    Default: zscaler/zscaler-mcp-server:latest
    Description: >-
      Container image URI. Defaults to the public Docker Hub image.
      Override for private mirrors or specific version pins.
  SecretArn:
    Type: String
    Description: >-
      Full ARN of the Secrets Manager secret holding the OneAPI credentials
      (includes the 6-char random suffix AWS appends). The task definition
      builds per-key references as <arn>:<JSON_KEY>::, which is the ECS-
      specific form for pulling a single JSON field out of a Secrets Manager
      secret. Reconstructing this ARN from a friendly name is not safe —
      always thread the full ARN through.

  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets hosting the ALB (must be public).
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets hosting Fargate tasks (private with NAT route).

  TaskExecutionRoleArn:
    Type: String
  TaskRoleArn:
    Type: String

  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 20
  TaskCpu:
    Type: String
    Default: '512'
    AllowedValues: ['256', '512', '1024', '2048', '4096']
  TaskMemory:
    Type: String
    Default: '1024'
    AllowedValues: ['512', '1024', '2048', '3072', '4096', '5120', '6144', '7168', '8192']

  ContainerPort:
    Type: Number
    Default: 8000

  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 180, 365, 400, 545, 731, 1827, 3653]

  # ── TLS configuration ──────────────────────────────────────────────────
  TlsMode:
    Type: String
    AllowedValues: [AcmManaged, AcmExisting, None]
    Description: >-
      AcmManaged → stack provisions a DNS-validated ACM cert against the
      Route53 hosted zone provided in HostedZoneId, then attaches it to a
      443 listener. AcmExisting → stack attaches a pre-existing cert via
      ExistingCertArn. None → ALB listens on plaintext HTTP only (demo use).
  HostedZoneId:
    Type: String
    Default: ''
    Description: Route53 hosted zone ID. Required when TlsMode=AcmManaged.
  DomainName:
    Type: String
    Default: ''
    Description: >-
      Public FQDN to terminate TLS on (e.g. zscaler-mcp.example.com).
      Required when TlsMode=AcmManaged.
  ExistingCertArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN. Required when TlsMode=AcmExisting.

  # ── MCP-client authentication ──────────────────────────────────────────
  McpAuthMode:
    Type: String
    Default: zscaler
    AllowedValues: [zscaler, jwt, api-key, none, oidcproxy]
  JwtJwksUri:
    Type: String
    Default: ''
  JwtIssuer:
    Type: String
    Default: ''
  JwtAudience:
    Type: String
    Default: zscaler-mcp-server
  ApiKey:
    Type: String
    Default: ''
    NoEcho: true
  OidcProxyClientId:
    Type: String
    Default: ''
  OidcProxyClientSecret:
    Type: String
    Default: ''
    NoEcho: true
  OidcProxyIssuer:
    Type: String
    Default: ''
  OidcProxyAudience:
    Type: String
    Default: ''

  # ── MCP feature flags ──────────────────────────────────────────────────
  WriteToolsEnabled:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
  WriteToolsAllowlist:
    Type: String
    Default: ''
  DisabledTools:
    Type: String
    Default: ''
  DisabledServices:
    Type: String
    Default: ''
  Toolsets:
    Type: String
    Default: ''
  DisabledToolsets:
    Type: String
    Default: ''
  EnableToolCallLogging:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

Conditions:

  TlsAcmManaged: !Equals [!Ref TlsMode, AcmManaged]
  TlsEnabled: !Or
    - !Equals [!Ref TlsMode, AcmManaged]
    - !Equals [!Ref TlsMode, AcmExisting]
  TlsDisabled: !Equals [!Ref TlsMode, None]
  IsJwt: !Equals [!Ref McpAuthMode, jwt]
  IsApiKey: !Equals [!Ref McpAuthMode, api-key]
  IsOidcProxy: !Equals [!Ref McpAuthMode, oidcproxy]
  IsNoAuth: !Equals [!Ref McpAuthMode, none]
  AuthEnabled: !Not [!Condition IsNoAuth]
  HasWriteAllowlist: !Not [!Equals [!Ref WriteToolsAllowlist, '']]
  HasDisabledTools: !Not [!Equals [!Ref DisabledTools, '']]
  HasDisabledServices: !Not [!Equals [!Ref DisabledServices, '']]
  HasToolsets: !Not [!Equals [!Ref Toolsets, '']]
  HasDisabledToolsets: !Not [!Equals [!Ref DisabledToolsets, '']]

Resources:

  # ── ECS Cluster ────────────────────────────────────────────────────────
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${ResourceNamePrefix}-cluster
      CapacityProviders: [FARGATE, FARGATE_SPOT]
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # ── CloudWatch log group ───────────────────────────────────────────────
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/ecs/${ResourceNamePrefix}
      RetentionInDays: !Ref LogRetentionDays

  # ── Security groups ────────────────────────────────────────────────────
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ResourceNamePrefix} ALB ingress'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - !If
          - TlsEnabled
          - { IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0, Description: HTTPS from anywhere }
          - !Ref AWS::NoValue
        - { IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0, Description: HTTP from anywhere }
      Tags:
        - { Key: Name, Value: !Sub '${ResourceNamePrefix}-alb-sg' }

  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ResourceNamePrefix} Fargate task ingress'
      VpcId: !Ref VpcId
      Tags:
        - { Key: Name, Value: !Sub '${ResourceNamePrefix}-task-sg' }

  TaskIngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref TaskSecurityGroup
      IpProtocol: tcp
      FromPort: !Ref ContainerPort
      ToPort: !Ref ContainerPort
      SourceSecurityGroupId: !Ref AlbSecurityGroup
      Description: MCP HTTP traffic from the ALB only

  # ── ACM cert (AcmManaged only) ─────────────────────────────────────────
  # DNS-validated against the supplied Route53 zone. CloudFormation handles
  # the validation CNAME record automatically.
  ManagedCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: TlsAcmManaged
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - { Key: Application, Value: zscaler-mcp-server }

  # ── Application Load Balancer ──────────────────────────────────────────
  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ResourceNamePrefix}-alb
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      Subnets: !Ref PublicSubnetIds
      SecurityGroups: [!Ref AlbSecurityGroup]
      LoadBalancerAttributes:
        - { Key: idle_timeout.timeout_seconds, Value: '300' }
        - { Key: routing.http.drop_invalid_header_fields.enabled, Value: 'true' }

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ResourceNamePrefix}-tg
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: !Ref ContainerPort
      TargetType: ip
      HealthCheckPath: /mcp
      # The MCP /mcp endpoint returns 406 when hit without proper headers
      # (FastMCP rejects non-MCP GETs). Accept that as healthy — the ALB
      # health check just needs proof the listener is up.
      Matcher:
        HttpCode: 200-499
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 4
      TargetGroupAttributes:
        - { Key: deregistration_delay.timeout_seconds, Value: '30' }
        - { Key: load_balancing.algorithm.type, Value: least_outstanding_requests }

  # ── Listeners ──────────────────────────────────────────────────────────
  # TLS path: 80 redirects to 443; 443 forwards to the target group.
  # Plaintext path: 80 forwards to the target group directly.

  HttpListenerRedirect:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: TlsEnabled
    Properties:
      LoadBalancerArn: !Ref Alb
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  HttpListenerForward:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: TlsDisabled
    Properties:
      LoadBalancerArn: !Ref Alb
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: TlsEnabled
    Properties:
      LoadBalancerArn: !Ref Alb
      Protocol: HTTPS
      Port: 443
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !If
            - TlsAcmManaged
            - !Ref ManagedCertificate
            - !Ref ExistingCertArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ── Route53 alias (AcmManaged only) ────────────────────────────────────
  AliasRecord:
    Type: AWS::Route53::RecordSet
    Condition: TlsAcmManaged
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt Alb.DNSName
        HostedZoneId: !GetAtt Alb.CanonicalHostedZoneID
        EvaluateTargetHealth: false

  # ── Task Definition ────────────────────────────────────────────────────
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ResourceNamePrefix}-task
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !Ref TaskExecutionRoleArn
      TaskRoleArn: !Ref TaskRoleArn
      ContainerDefinitions:
        - Name: zscaler-mcp
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          # `secrets` pulls each JSON field out of the Secrets Manager
          # secret and binds it as an env var. ECS supports the special
          # `<secret-arn>:<JSON_KEY>:<VERSION_STAGE>:<VERSION_ID>` form for
          # this — we leave the two trailing fields empty so we get the
          # latest AWSCURRENT version.
          Secrets:
            - { Name: ZSCALER_CLIENT_ID,     ValueFrom: !Sub '${SecretArn}:ZSCALER_CLIENT_ID::' }
            - { Name: ZSCALER_CLIENT_SECRET, ValueFrom: !Sub '${SecretArn}:ZSCALER_CLIENT_SECRET::' }
            - { Name: ZSCALER_VANITY_DOMAIN, ValueFrom: !Sub '${SecretArn}:ZSCALER_VANITY_DOMAIN::' }
            - { Name: ZSCALER_CUSTOMER_ID,   ValueFrom: !Sub '${SecretArn}:ZSCALER_CUSTOMER_ID::' }
            - { Name: ZSCALER_CLOUD,         ValueFrom: !Sub '${SecretArn}:ZSCALER_CLOUD::' }
          Environment:
            # ── Transport (always streamable-http behind the ALB) ──────────
            - { Name: ZSCALER_MCP_TRANSPORT, Value: streamable-http }
            - { Name: ZSCALER_MCP_HOST,      Value: 0.0.0.0 }
            - { Name: ZSCALER_MCP_PORT,      Value: !Ref ContainerPort }
            # ── ALB terminates TLS upstream of the container ───────────────
            - { Name: ZSCALER_MCP_ALLOW_HTTP, Value: 'true' }
            # ── ALB is the sole ingress; its Host header is unpredictable ──
            - { Name: ZSCALER_MCP_DISABLE_HOST_VALIDATION, Value: 'true' }
            # ── FastMCP stateless mode (tasks are ephemeral) ───────────────
            - { Name: FASTMCP_STATELESS_HTTP, Value: 'true' }
            # ── MCP client auth ────────────────────────────────────────────
            - { Name: ZSCALER_MCP_AUTH_ENABLED, Value: !If [AuthEnabled, 'true', 'false'] }
            - { Name: ZSCALER_MCP_AUTH_MODE, Value: !Ref McpAuthMode }
            - !If [IsJwt, { Name: ZSCALER_MCP_AUTH_JWKS_URI, Value: !Ref JwtJwksUri }, !Ref AWS::NoValue]
            - !If [IsJwt, { Name: ZSCALER_MCP_AUTH_ISSUER, Value: !Ref JwtIssuer }, !Ref AWS::NoValue]
            - !If [IsJwt, { Name: ZSCALER_MCP_AUTH_AUDIENCE, Value: !Ref JwtAudience }, !Ref AWS::NoValue]
            - !If [IsApiKey, { Name: ZSCALER_MCP_AUTH_API_KEY, Value: !Ref ApiKey }, !Ref AWS::NoValue]
            - !If [IsOidcProxy, { Name: OIDCPROXY_CLIENT_ID, Value: !Ref OidcProxyClientId }, !Ref AWS::NoValue]
            - !If [IsOidcProxy, { Name: OIDCPROXY_CLIENT_SECRET, Value: !Ref OidcProxyClientSecret }, !Ref AWS::NoValue]
            - !If [IsOidcProxy, { Name: OIDCPROXY_ISSUER, Value: !Ref OidcProxyIssuer }, !Ref AWS::NoValue]
            - !If [IsOidcProxy, { Name: OIDCPROXY_AUDIENCE, Value: !Ref OidcProxyAudience }, !Ref AWS::NoValue]
            # ── Feature flags ──────────────────────────────────────────────
            - { Name: ZSCALER_MCP_WRITE_ENABLED, Value: !Ref WriteToolsEnabled }
            - !If [HasWriteAllowlist, { Name: ZSCALER_MCP_WRITE_TOOLS, Value: !Ref WriteToolsAllowlist }, !Ref AWS::NoValue]
            - !If [HasDisabledTools, { Name: ZSCALER_MCP_DISABLED_TOOLS, Value: !Ref DisabledTools }, !Ref AWS::NoValue]
            - !If [HasDisabledServices, { Name: ZSCALER_MCP_DISABLED_SERVICES, Value: !Ref DisabledServices }, !Ref AWS::NoValue]
            - !If [HasToolsets, { Name: ZSCALER_MCP_TOOLSETS, Value: !Ref Toolsets }, !Ref AWS::NoValue]
            - !If [HasDisabledToolsets, { Name: ZSCALER_MCP_DISABLED_TOOLSETS, Value: !Ref DisabledToolsets }, !Ref AWS::NoValue]
            - { Name: ZSCALER_MCP_LOG_TOOL_CALLS, Value: !Ref EnableToolCallLogging }
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: zscaler-mcp

  # ── ECS Service ────────────────────────────────────────────────────────
  # Two variants depending on TLS mode because DependsOn cannot be
  # conditional with Fn::If — listeners are conditional resources, so we
  # bind to whichever set exists. The service's LoadBalancers reference
  # is identical in both cases.
  ServiceTls:
    Type: AWS::ECS::Service
    Condition: TlsEnabled
    DependsOn:
      - HttpsListener
      - HttpListenerRedirect
    Properties:
      ServiceName: !Sub ${ResourceNamePrefix}-service
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      TaskDefinition: !Ref TaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups: [!Ref TaskSecurityGroup]
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: zscaler-mcp
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup
      HealthCheckGracePeriodSeconds: 60

  ServicePlain:
    Type: AWS::ECS::Service
    Condition: TlsDisabled
    DependsOn:
      - HttpListenerForward
    Properties:
      ServiceName: !Sub ${ResourceNamePrefix}-service
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      TaskDefinition: !Ref TaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups: [!Ref TaskSecurityGroup]
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: zscaler-mcp
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup
      HealthCheckGracePeriodSeconds: 60

Outputs:

  ClusterName:
    Value: !Ref Cluster
  ServiceName:
    Value: !If [TlsEnabled, !GetAtt ServiceTls.Name, !GetAtt ServicePlain.Name]
  TaskDefinitionArn:
    Value: !Ref TaskDefinition
  AlbDnsName:
    Description: ALB DNS name (use when TlsMode=None or AcmExisting without Route53).
    Value: !GetAtt Alb.DNSName
  McpUrl:
    Description: >-
      Publicly accessible MCP endpoint URL. Connect an MCP client to this
      URL (e.g. via mcp-remote for Claude Desktop, or `url:` for Cursor).
    Value: !Sub
      - '${Scheme}://${Host}/mcp'
      - Scheme: !If [TlsEnabled, https, http]
        Host: !If [TlsAcmManaged, !Ref DomainName, !GetAtt Alb.DNSName]
  LogGroupName:
    Value: !Ref LogGroup
  CertificateArn:
    Condition: TlsAcmManaged
    Description: ARN of the ACM certificate the stack provisioned.
    Value: !Ref ManagedCertificate
