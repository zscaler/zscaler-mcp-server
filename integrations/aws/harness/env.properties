# =========================================================================
# Zscaler MCP Server — AWS Bedrock AgentCore Harness deployment template
# =========================================================================
# Copy this file to `.env` in the same directory, fill in the values, and
# run `python harness_mcp_operations.py deploy`. Every variable is also
# overridable via CLI flags or supplied interactively when the script
# prompts. Mirrors the convention used by ../bedrock-agentcore/env.properties
# so the same `.env` can drive both deployments side-by-side.
#
# Layout:
#   1. REQUIRED        — Zscaler OneAPI credentials
#   2. AWS TARGETING   — region, profile, harness resource names
#   3. MCP HOST        — Amazon ECS Express Mode (default) or bring-your-own URL
#   4. SECRETS MANAGER — credential storage (on by default, opt-out possible)
#   5. CONTAINER IMAGE — dev override for ZSCALER_MCP_IMAGE_URI
#   6. FEATURE FLAGS   — write tools / disabled tools / audit logging
#   7. MODEL OVERRIDE  — Bedrock model selection
#   8. TOPOLOGY        — ECS Express vs AgentCore Runtime+Gateway (PR #48)
# =========================================================================


# =========================================================================
# 1. REQUIRED — Zscaler OneAPI credentials
# =========================================================================
# Zscaler OneAPI credentials from ZIdentity → Administration → API Keys.
# All four are required when the script deploys the MCP server itself
# (the default ECS Express Mode path); only CLIENT_ID and CLIENT_SECRET
# are strictly needed when you're attaching to a pre-existing MCP URL
# (set MCP_URL below) because the Token Vault only stores the Basic header.
ZSCALER_CLIENT_ID=NOT_SET
ZSCALER_CLIENT_SECRET=NOT_SET
ZSCALER_CUSTOMER_ID=NOT_SET
ZSCALER_VANITY_DOMAIN=NOT_SET

# Zscaler cloud override. Leave as "production" unless you're on the Beta
# tenant (then "beta"). Other values are rarely needed.
# ZSCALER_CLOUD=production


# =========================================================================
# 2. AWS targeting + harness resource names
# =========================================================================

# AWS region for both the ECS Express service AND the Harness control
# plane. Harness is currently preview with limited regional coverage —
# check the AWS docs for the live list. Defaults to us-east-1.
# AWS_REGION=us-east-1

# Named profile to use from ~/.aws/credentials. If unset, uses the
# default boto3 credential chain (env vars, EC2/ECS task role, etc.).
# AWS_PROFILE=

# Harness resource names. Override these only if you need multiple
# parallel deployments in the same account/region. The script reuses
# existing resources by name when they already exist (idempotent on
# re-deploy).
# HARNESS_NAME=zscaler-mcp-harness
# ROLE_NAME=zscaler-mcp-harness-execution-role
# CREDENTIAL_PROVIDER_NAME=zscaler-mcp-creds

# ECS Express resource names. Same idempotency rule as above. The cluster
# is created on demand and deleted on `destroy` only if the script
# created it (a pre-existing cluster is preserved so the destroy doesn't
# touch unrelated services).
# ECS_CLUSTER_NAME=zscaler-mcp
# ECS_SERVICE_NAME=zscaler-mcp-server
# ECS_EXECUTION_ROLE_NAME=zscaler-mcp-ecs-task-execution-role
# ECS_INFRASTRUCTURE_ROLE_NAME=zscaler-mcp-ecs-infrastructure-role
# ECS_LOG_GROUP=/ecs/zscaler-mcp


# =========================================================================
# 3. MCP HOST — Amazon ECS Express Mode (default) or bring-your-own URL
# =========================================================================
# Default behaviour: the script deploys the Zscaler MCP server to Amazon
# ECS Express Mode (auto-managed ALB + HTTPS, ~3-4 min) using the same
# container image that the AgentCore Runtime deploy uses. ECS Express
# auto-provisions the load balancer, target groups, security groups,
# auto-scaling policies, and a stable public HTTPS endpoint of the form
# `xxxxx.ecs.<region>.on.aws`. Harness's `remote_mcp` tool authenticates
# to it with a static `Authorization: Basic …` header sourced from the
# Token Vault.
#
# Why ECS Express Mode rather than App Runner? AWS stopped onboarding
# new App Runner customers on Apr 30, 2026; Express Mode is the
# AWS-recommended replacement (same one-API-call UX, fully managed
# infrastructure, automatic TLS).
#
# If you already have a non-SigV4 MCP endpoint running elsewhere
# (Cloud Run, Azure Container Apps, EC2 + systemd, on-prem with ngrok,
# Kubernetes + Ingress, …) set MCP_URL below and the ECS deploy is
# skipped. The URL must accept the same Basic auth header the MCP
# server's Zscaler-mode middleware expects.
#
# CAUTION: A SigV4-protected AgentCore Runtime invocation URL
# (https://bedrock-agentcore.<region>.amazonaws.com/runtimes/...) will
# NOT work — Harness's remote_mcp cannot sign with SigV4. Calls return
# HTTP 403.
#
# MCP_URL=https://my-mcp.example.com/mcp/


# =========================================================================
# 4. SECRETS MANAGER — Zscaler credential storage
# =========================================================================
# By default the deploy script stores the 5-key Zscaler credential bundle
# (CLIENT_ID, CLIENT_SECRET, VANITY_DOMAIN, CUSTOMER_ID, CLOUD) in AWS
# Secrets Manager under `zscaler-mcp-harness/credentials` and wires only
# `ZSCALER_SECRET_NAME=<that-name>` into the ECS task definition. The
# container's `zscaler_mcp.config` module fetches the secret at boot via
# boto3 and injects each key into `os.environ`, so the SDK sees the same
# env vars it would have received as plaintext — but no Zscaler credential
# ever appears in `aws ecs describe-task-definition`, `RegisterTaskDefinition`
# CloudTrail events, or the ECS console. The ECS task execution role
# is automatically granted scoped `secretsmanager:GetSecretValue` +
# `kms:Decrypt` on the secret only.
#
# Three deploy modes:
#
#   * Default (recommended)    — leave both vars below unset. The script
#                                creates `zscaler-mcp-harness/credentials`,
#                                populates it from the ZSCALER_* vars
#                                above, and deletes it on `destroy` with
#                                a 7-day soft-delete recovery window.
#
#   * Bring-your-own secret    — set ZSCALER_SECRET_NAME to a pre-existing
#                                secret ARN or name (managed by Terraform,
#                                CloudFormation, or another operator). The
#                                script verifies it exists, references it,
#                                but NEVER overwrites its value or deletes
#                                it on `destroy`. The secret JSON must use
#                                the same key names as ZSCALER_CLIENT_ID /
#                                CLIENT_SECRET / VANITY_DOMAIN / etc.
#
#   * Opt-out (--no-secrets-manager)
#                              — pass --no-secrets-manager to the deploy
#                                CLI to keep the legacy plaintext-env
#                                behaviour. Only for dev / debugging;
#                                production deploys should leave this off.
#
# ZSCALER_SECRET_NAME=arn:aws:secretsmanager:us-east-1:123456789012:secret:zscaler-mcp-creds-abc123


# =========================================================================
# 5. CONTAINER IMAGE — dev override
# =========================================================================
# Default: the script pulls the official AWS Marketplace image and
# tracks the supported "<semver>-bedrock" tag internally. Override only
# when you need to:
#   * Pin an older Marketplace tag
#   * Test a development build pushed to your own ECR
#   * Mirror to a private ECR for an air-gapped deploy
# Whitespace-only / empty values are treated as unset. The ECS task
# execution role's cross-account ECR pull policy is automatically
# scoped to whichever registry account is in the URI (parsed from
# `<account>.dkr.ecr.…`), so dev builds in your own account work
# without any IAM tweaks.
#
# IMPORTANT: Dev images must include linux/amd64 (ECS Fargate is amd64
# by default). Plain `docker build` on Apple Silicon produces an
# arm64-only image and the container will crash at startup with
# `exec /usr/local/bin/python: exec format error`. Use the Makefile
# target:
#
#   # Single-arch (1 ECR row, smallest layout — good for dev-only ECS)
#   make docker-build-multiarch \
#     IMAGE=123456789012.dkr.ecr.us-east-1.amazonaws.com/zscaler-mcp-server:dev \
#     PLATFORMS=linux/amd64
#
#   # Multi-arch (3 ECR rows: manifest + amd64 + arm64 — works on Graviton + Mac too)
#   make docker-build-multiarch \
#     IMAGE=123456789012.dkr.ecr.us-east-1.amazonaws.com/zscaler-mcp-server:dev
#
# The multi-arch path builds and pushes BOTH archs under the same tag, so the same
# image works on ECS, Graviton, and your local Mac.
#
# ZSCALER_MCP_IMAGE_URI=123456789012.dkr.ecr.us-east-1.amazonaws.com/zscaler-mcp-server:dev


# =========================================================================
# 6. FEATURE FLAGS (passed through to the MCP server container)
# =========================================================================
# Only consulted when the script is deploying the MCP server itself
# (the ECS Express path). Ignored when MCP_URL is set — those flags
# have to be configured on whatever already hosts the server.

# Write tools are disabled by default. Enable + allowlist to allow
# create/update/delete operations.
# ZSCALER_MCP_WRITE_ENABLED=true
# ZSCALER_MCP_WRITE_TOOLS=zpa_create_*,zia_update_*

# Block specific tools or whole services (fnmatch wildcards supported).
# ZSCALER_MCP_DISABLED_TOOLS=zcc_*
# ZSCALER_MCP_DISABLED_SERVICES=zcc,zdx

# Audit every tool call to CloudWatch. Recommended on for production.
ZSCALER_MCP_LOG_TOOL_CALLS=true


# =========================================================================
# 7. Bedrock model override (optional)
# =========================================================================
# Inference-profile model ID. Must be enabled in your Bedrock account
# (Bedrock console → Model access). Anthropic models also require a
# one-time use-case form. The script will prompt interactively if this
# is unset.
#
# Supported defaults (matches strands_agent_chat.py catalogue):
#   us.anthropic.claude-sonnet-4-5-20250929-v1:0   (default)
#   us.anthropic.claude-opus-4-5-20250929-v1:0
#   us.amazon.nova-pro-v1:0
#   us.meta.llama3-3-70b-instruct-v1:0
#
# MODEL_ID=us.anthropic.claude-sonnet-4-5-20250929-v1:0


# =========================================================================
# 8. TOPOLOGY — ECS Express (default) vs AgentCore Runtime + Gateway (PR #48)
# =========================================================================
# Two end-to-end deployment shapes are supported. Pick one — the script
# prompts interactively when TOPOLOGY is unset.
#
#   ecs       (default — same as PR #47, backward-compatible)
#             User → Harness → remote_mcp → ECS Express service.
#             • Auth: Token Vault Basic header (Zscaler-mode middleware).
#             • Components: ECS cluster + ALB + execution / infra IAM roles
#               + Secrets Manager + CloudWatch log group + Harness.
#             • Why pick this: shortest path; no Cognito infra to manage.
#
#   gateway   (PR #48 — Runtime + Gateway + Amazon Cognito as IdP)
#             User → Harness → agentcore_gateway → AgentCore Gateway →
#             AgentCore Runtime → MCP container.
#             • Auth (all three boundaries): Cognito-issued JWTs brokered
#               by a single OAuth2 credential provider in Token Vault.
#             • Components: Cognito User Pool + App Client + Resource
#               Server + hosted-UI domain + AgentCore Runtime + Runtime
#               execution role + Gateway + mcpServer target + Gateway
#               service role + OAuth2 credential provider + Harness.
#             • Why pick this: no ALB / ECS, fully AWS-native auth path,
#               same Gateway can later front non-Harness MCP clients.
#
# TOPOLOGY=ecs
# TOPOLOGY=gateway


# =========================================================================
# 8a. Gateway-topology resource names (only consulted when TOPOLOGY=gateway)
# =========================================================================
# All have safe defaults. Override only if you need parallel deployments
# in the same account / region. The defaults are namespaced under
# `zscaler-mcp-harness-*` and `zscaler-mcp-*` so they don't collide with
# the sibling bedrock-agentcore deployment.
#
# AgentCore Runtime — must match [a-zA-Z][a-zA-Z0-9_]{0,39} (underscores
# only, no hyphens, max 40 chars).
# RUNTIME_NAME=zscaler_mcp_runtime
# RUNTIME_EXECUTION_ROLE_NAME=zscaler-mcp-harness-runtime-role
#
# AgentCore Gateway
# GATEWAY_NAME=zscaler-mcp-gateway
# GATEWAY_TARGET_NAME=zscaler-mcp-runtime
# GATEWAY_ROLE_NAME=zscaler-mcp-harness-gateway-role
#
# AgentCore Identity OAuth2 credential provider (backs both Harness→Gateway
# and Gateway→Runtime legs).
# OAUTH_PROVIDER_NAME=zscaler-mcp-cognito-oauth
#
# Amazon Cognito. The domain prefix is auto-suffixed with the AWS account
# ID for global uniqueness — the FINAL domain becomes
# `<prefix>-<accountId>.auth.<region>.amazoncognito.com`.
# COGNITO_USER_POOL_NAME=zscaler-mcp-harness-up
# COGNITO_RESOURCE_SERVER_IDENTIFIER=zscaler-mcp
# COGNITO_SCOPE_NAME=invoke
# COGNITO_APP_CLIENT_NAME=zscaler-mcp-harness-client
# COGNITO_DOMAIN_PREFIX=zscaler-mcp-harness
