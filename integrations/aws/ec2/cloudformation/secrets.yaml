AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Zscaler MCP Server on EC2 — Secrets Manager nested stack. Creates a single
  KMS-encrypted Secret holding the env vars the MCP server expects at startup.
  Only invoked when the root stack's CredentialSource=CreateNew.

Parameters:

  ResourceNamePrefix:
    Type: String
  ZscalerClientId:
    Type: String
    NoEcho: true
  ZscalerClientSecret:
    Type: String
    NoEcho: true
  ZscalerVanityDomain:
    Type: String
  ZscalerCustomerId:
    Type: String
  ZscalerCloud:
    Type: String
    Default: production

Resources:

  ZscalerCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${ResourceNamePrefix}/credentials
      Description: >-
        Zscaler OneAPI credentials consumed by the Zscaler MCP Server on
        EC2 at startup. Always KMS-encrypted at rest.
      KmsKeyId: alias/aws/secretsmanager
      SecretString: !Sub |
        {
          "ZSCALER_CLIENT_ID":      "${ZscalerClientId}",
          "ZSCALER_CLIENT_SECRET":  "${ZscalerClientSecret}",
          "ZSCALER_VANITY_DOMAIN":  "${ZscalerVanityDomain}",
          "ZSCALER_CUSTOMER_ID":    "${ZscalerCustomerId}",
          "ZSCALER_CLOUD":          "${ZscalerCloud}"
        }
      Tags:
        - Key: Application
          Value: zscaler-mcp-server
        - Key: Deployment
          Value: ec2
        - Key: ManagedBy
          Value: cloudformation

Outputs:

  SecretName:
    Value: !Ref ZscalerCredentialsSecret
  SecretArn:
    Value: !Ref ZscalerCredentialsSecret
