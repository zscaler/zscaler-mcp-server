# =========================================================================
# Zscaler MCP Server — AWS EC2 Deployment Configuration
# =========================================================================
# Optional: provide this file via the interactive deployment script.
#
#   python ec2_mcp_operations.py deploy --env-file env.properties
#
# All variables are also overridable via the script's interactive prompts.
# Setting a value here pre-fills the prompt; leaving it unset triggers an
# interactive question.
# =========================================================================


# =========================================================================
# 1. REQUIRED
# =========================================================================
AWS_REGION=us-east-1
AWS_STACK_NAME=zscaler-mcp-ec2
AWS_RESOURCE_NAME_PREFIX=zscaler-mcp


# =========================================================================
# 2. OPTIONAL
# =========================================================================
# S3 bucket the deploy uses for nested CFN templates. Auto-created if it
# doesn't exist. Leave blank → script generates "<prefix>-cfn-<acct>-<rgn>".
# AWS_ASSET_BUCKET=

# MCP server name registered into client configs.
# MCP_SERVER_NAME=zscaler-mcp-aws-ec2


# =========================================================================
# 3. CREDENTIALS — Secrets Manager
# =========================================================================
# (a) Reuse an EXISTING Secrets Manager secret (RECOMMENDED):
#         ZSCALER_SECRET_NAME=zscaler/mcp/credentials
#     The secret must be a JSON object with these keys:
#       ZSCALER_CLIENT_ID, ZSCALER_CLIENT_SECRET, ZSCALER_VANITY_DOMAIN,
#       ZSCALER_CUSTOMER_ID, ZSCALER_CLOUD
#     If you also know the ARN, set ZSCALER_SECRET_ARN to skip the lookup.
# ZSCALER_SECRET_NAME=
# ZSCALER_SECRET_ARN=

# (b) Create a NEW secret from the Zscaler creds below (dev/test).
ZSCALER_CLIENT_ID=NOT_SET
ZSCALER_CLIENT_SECRET=NOT_SET
ZSCALER_VANITY_DOMAIN=NOT_SET
ZSCALER_CUSTOMER_ID=NOT_SET
ZSCALER_CLOUD=production


# =========================================================================
# 4. NETWORK
# =========================================================================
# AWS_NETWORK_MODE=CreateNew      # or UseExisting
# AWS_VPC_CIDR=10.42.0.0/16        # used only with CreateNew

# Used only with UseExisting. All three required.
# AWS_VPC_ID=vpc-0123abcd
# AWS_PUBLIC_SUBNET_IDS=subnet-aaa,subnet-bbb   # ALB lives here
# AWS_PRIVATE_SUBNET_IDS=subnet-ccc,subnet-ddd  # EC2 instance lives here
# NOTE: Private subnets MUST have a route to a NAT gateway — the bootstrap
# script needs outbound HTTPS to install Python packages from PyPI and to
# call the Zscaler OneAPI at runtime.


# =========================================================================
# 5. TLS
# =========================================================================
# AWS_TLS_MODE=AcmManaged          # AcmManaged | AcmExisting | None
# AWS_HOSTED_ZONE_ID=Z0123...      # required for AcmManaged
# AWS_DOMAIN_NAME=mcp.example.com  # required for AcmManaged
# AWS_CERT_ARN=arn:aws:acm:...     # required for AcmExisting


# =========================================================================
# 6. EC2 instance
# =========================================================================
AWS_INSTANCE_TYPE=t3.small
# Optional: enable SSH. Leave both blank to use SSM Session Manager only
# (recommended — no inbound 22 needed).
# AWS_SSH_INGRESS_CIDR=203.0.113.0/24
# AWS_KEY_PAIR_NAME=my-keypair


# =========================================================================
# 7. AUTHENTICATION
# =========================================================================
ZSCALER_MCP_AUTH_MODE=zscaler

# ── JWT mode ─────────────────────────────────────────────────────────────
# ZSCALER_MCP_AUTH_JWKS_URI=
# ZSCALER_MCP_AUTH_ISSUER=
# ZSCALER_MCP_AUTH_AUDIENCE=zscaler-mcp-server

# ── API-key mode (auto-generated when blank) ─────────────────────────────
# ZSCALER_MCP_AUTH_API_KEY=

# ── OIDCProxy mode ───────────────────────────────────────────────────────
# OIDCPROXY_CLIENT_ID=
# OIDCPROXY_CLIENT_SECRET=
# OIDCPROXY_ISSUER=
# OIDCPROXY_AUDIENCE=


# =========================================================================
# 8. FEATURE FLAGS
# =========================================================================
ZSCALER_MCP_WRITE_ENABLED=false
# ZSCALER_MCP_WRITE_TOOLS=zpa_create_*,zia_update_*
# ZSCALER_MCP_DISABLED_TOOLS=
# ZSCALER_MCP_DISABLED_SERVICES=
# ZSCALER_MCP_TOOLSETS=default
# ZSCALER_MCP_DISABLED_TOOLSETS=
ZSCALER_MCP_LOG_TOOL_CALLS=true

# Listener port the MCP server binds on the instance (ALB targets this).
AWS_MCP_PORT=8000

# CloudWatch log retention (days). Allowed values:
#   1, 3, 5, 7, 14, 30, 60, 90, 180, 365, 400, 545, 731, 1827, 3653
AWS_LOG_RETENTION_DAYS=14
