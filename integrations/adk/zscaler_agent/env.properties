# Google ADK Configuration
GOOGLE_GENAI_USE_VERTEXAI=False
GOOGLE_API_KEY=NOT_SET
GOOGLE_MODEL=gemini-2.5-flash

# Zscaler OneAPI Credentials
ZSCALER_CLIENT_ID=NOT_SET
ZSCALER_CLIENT_SECRET=NOT_SET
ZSCALER_VANITY_DOMAIN=NOT_SET
ZSCALER_CUSTOMER_ID=NOT_SET
ZSCALER_CLOUD=NOT_SET

# Optional MCP Configuration
# Comma-separated services to enable (e.g., zia,zpa,zdx)
ZSCALER_MCP_SERVICES=
# Enable write tools (true/false)
ZSCALER_MCP_WRITE_ENABLED=
# Comma-separated write tool patterns to allow (e.g., zpa_*,zia_*)
ZSCALER_MCP_WRITE_TOOLS=
# Comma-separated services to disable (e.g., zcc,zdx)
ZSCALER_MCP_DISABLED_SERVICES=
# Comma-separated tool patterns to disable (e.g., zcc_*,zia_list_device*)
ZSCALER_MCP_DISABLED_TOOLS=

# MCP Server Security Enforcement
# The MCP server enforces these security features by default:
#   - Authentication: enabled for HTTP transports (not applicable for stdio)
#   - HTTPS: required unless explicitly opted out
#   - Host validation: checks Host header against allowlist
# For stdio transport (local development), these are not applicable.
# For Cloud Run or Agent Engine deployments, configure as needed.
ZSCALER_MCP_AUTH_ENABLED=
ZSCALER_MCP_ALLOW_HTTP=
ZSCALER_MCP_ALLOWED_HOSTS=
ZSCALER_MCP_ALLOWED_SOURCE_IPS=
ZSCALER_MCP_TLS_CERTFILE=
ZSCALER_MCP_TLS_KEYFILE=
ZSCALER_MCP_DISABLE_HOST_VALIDATION=

# Write-operation safety
# Skip HMAC confirmation for destructive ops (true/false)
ZSCALER_MCP_SKIP_CONFIRMATIONS=
# Confirmation token TTL in seconds (default 300)
ZSCALER_MCP_CONFIRMATION_TTL=

# Cloud Run Deployment
PROJECT_ID=NOT_SET
REGION=NOT_SET

# Vertex AI Agent Engine - Should use format gs://your-staging-bucket
AGENT_ENGINE_STAGING_BUCKET=NOT_SET

# Agentspace Registration
PROJECT_NUMBER=NOT_SET
# only 'global' location supported
AGENT_LOCATION=NOT_SET
REASONING_ENGINE_NUMBER=NOT_SET
AGENT_SPACE_APP_NAME=NOT_SET

# Performance
# default -1 means send all user conversations to the LLM
# recommended value - 5
MAX_PREV_USER_INTERACTIONS=-1
