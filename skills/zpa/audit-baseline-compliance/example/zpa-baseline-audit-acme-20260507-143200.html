<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZPA Baseline Compliance Audit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ---------- Theme tokens ---------- */
    :root, [data-theme="dark"] {
      --zs-bg: #050912;
      --zs-panel: #0d1426;
      --zs-card: #131c33;
      --zs-border: rgba(255, 255, 255, 0.08);
      --zs-border-strong: rgba(255, 255, 255, 0.16);
      --zs-text: #e6eaf3;
      --zs-muted: #8a93a8;
      --zs-logo-fill: #ffffff;
      --zs-cyan: #3cc0e5;
      --zs-blue: #4a7cff;
      --zs-purple: #8a5cff;
      --zs-evidence-bg: rgba(255, 255, 255, 0.03);
      --zs-chip-active-bg: linear-gradient(90deg, rgba(60, 192, 229, 0.18), rgba(74, 124, 255, 0.18));
      --zs-stat-active-ring: rgba(60, 192, 229, 0.6);
    }
    [data-theme="light"] {
      --zs-bg: #f4f6fb;
      --zs-panel: #ffffff;
      --zs-card: #ffffff;
      --zs-border: rgba(15, 23, 42, 0.08);
      --zs-border-strong: rgba(15, 23, 42, 0.18);
      --zs-text: #0a1429;
      --zs-muted: #4b5563;
      --zs-logo-fill: #236bf5;
      --zs-cyan: #0ea5e9;
      --zs-blue: #2563eb;
      --zs-purple: #7c3aed;
      --zs-evidence-bg: rgba(15, 23, 42, 0.03);
      --zs-chip-active-bg: linear-gradient(90deg, rgba(14, 165, 233, 0.12), rgba(37, 99, 235, 0.12));
      --zs-stat-active-ring: rgba(37, 99, 235, 0.45);
    }
    html, body {
      background: var(--zs-bg);
      color: var(--zs-text);
      font-family: 'Inter', 'Noto Sans JP', 'Noto Sans SC', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
    }
    .grad-text {
      background: linear-gradient(90deg, var(--zs-cyan) 0%, var(--zs-blue) 50%, var(--zs-purple) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .panel { background: var(--zs-panel); border: 1px solid var(--zs-border); }
    .card  { background: var(--zs-card);  border: 1px solid var(--zs-border); }

    /* Logo */
    .zs-logo {
      height: 28px;
      width: auto;
      color: var(--zs-logo-fill);
      display: block;
    }

    /* Pills */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .pill-critical { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); }
    .pill-warning  { background: rgba(245, 158, 11, 0.15); color: #d97706; border: 1px solid rgba(245, 158, 11, 0.4); }
    .pill-info     { background: rgba(6, 182, 212, 0.15);  color: #0891b2; border: 1px solid rgba(6, 182, 212, 0.4); }
    .pill-neutral  { background: rgba(138, 147, 168, 0.12); color: var(--zs-muted); border: 1px solid var(--zs-border); }
    .pill-heuristic{ background: rgba(138, 92, 255, 0.15); color: #7c3aed; border: 1px solid rgba(138, 92, 255, 0.4); }
    .pill-fw-nist  { background: rgba(148, 163, 184, 0.14); color: #475569; border: 1px solid rgba(148, 163, 184, 0.4); font-family: 'SFMono-Regular', Menlo, Monaco, Consolas, monospace; text-transform: none; letter-spacing: 0; }
    .pill-fw-cis   { background: rgba(37, 99, 235, 0.12);   color: #1d4ed8; border: 1px solid rgba(37, 99, 235, 0.4);   font-family: 'SFMono-Regular', Menlo, Monaco, Consolas, monospace; text-transform: none; letter-spacing: 0; }
    [data-theme="dark"] .pill-critical { color: #fca5a5; }
    [data-theme="dark"] .pill-warning  { color: #fcd34d; }
    [data-theme="dark"] .pill-info     { color: #67e8f9; }
    [data-theme="dark"] .pill-heuristic{ color: #c4b5fd; }
    [data-theme="dark"] .pill-fw-nist  { color: #cbd5e1; background: rgba(148, 163, 184, 0.14); border-color: rgba(148, 163, 184, 0.35); }
    [data-theme="dark"] .pill-fw-cis   { color: #93c5fd; background: rgba(74, 124, 255, 0.18); border-color: rgba(74, 124, 255, 0.45); }

    /* Disclaimer banner */
    .disclaimer-banner {
      background: linear-gradient(90deg, rgba(60, 192, 229, 0.06), rgba(74, 124, 255, 0.06));
      border: 1px solid var(--zs-border);
      border-left: 3px solid var(--zs-cyan);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--zs-muted);
      font-style: italic;
      line-height: 1.5;
    }

    /* Filter chips */
    .filter-chip {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      border: 1px solid var(--zs-border);
      background: transparent;
      color: var(--zs-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-chip:hover { color: var(--zs-text); border-color: var(--zs-cyan); }
    .filter-chip.active {
      background: var(--zs-chip-active-bg);
      color: var(--zs-text);
      border-color: var(--zs-cyan);
    }

    /* Stat cards (clickable) */
    .stat-card {
      background: var(--zs-card);
      border: 1px solid var(--zs-border);
      border-radius: 12px;
      padding: 20px;
      text-align: left;
      width: 100%;
      cursor: pointer;
      transition: all 0.15s;
    }
    .stat-card:hover { border-color: var(--zs-border-strong); transform: translateY(-1px); }
    .stat-card.active {
      border-color: var(--zs-cyan);
      box-shadow: 0 0 0 1px var(--zs-stat-active-ring);
    }
    .stat-num { font-size: 36px; font-weight: 700; line-height: 1; }
    .stat-num.critical { color: #ef4444; }
    .stat-num.warning  { color: #d97706; }
    .stat-num.info     { color: #0891b2; }
    .stat-num.neutral  { color: var(--zs-muted); }
    [data-theme="dark"] .stat-num.critical { color: #fca5a5; }
    [data-theme="dark"] .stat-num.warning  { color: #fcd34d; }
    [data-theme="dark"] .stat-num.info     { color: #67e8f9; }

    /* Finding cards */
    .finding-card {
      background: var(--zs-card);
      border: 1px solid var(--zs-border);
      border-radius: 12px;
      transition: border-color 0.15s;
      overflow: hidden;
    }
    .finding-card:hover { border-color: var(--zs-cyan); }
    .finding-card.critical-border { border-left: 3px solid #ef4444; }
    .finding-card.warning-border  { border-left: 3px solid #f59e0b; }
    .finding-card.info-border     { border-left: 3px solid #06b6d4; }
    .finding-card.neutral-border  { border-left: 3px solid #6b7280; }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(90deg, var(--zs-cyan), var(--zs-blue));
      color: #ffffff;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
    .btn-primary:hover { opacity: 0.9; }
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--zs-border);
      background: transparent;
      color: var(--zs-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .icon-btn:hover { color: var(--zs-text); border-color: var(--zs-cyan); }
    .icon-btn .icon { width: 18px; height: 18px; }

    /* Search input */
    .search-input {
      background: var(--zs-panel);
      border: 1px solid var(--zs-border);
      color: var(--zs-text);
      padding: 10px 14px;
      border-radius: 8px;
      width: 100%;
      font-size: 14px;
    }
    .search-input:focus { outline: none; border-color: var(--zs-cyan); }
    .search-input::placeholder { color: var(--zs-muted); }

    /* Evidence */
    .evidence-item {
      background: var(--zs-evidence-bg);
      border-left: 2px solid var(--zs-cyan);
      padding: 8px 12px;
      font-family: 'SFMono-Regular', Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      color: var(--zs-text);
      border-radius: 0 6px 6px 0;
    }

    .toggle-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: var(--zs-evidence-bg);
      color: var(--zs-muted);
      font-size: 16px;
      line-height: 1;
    }

    /* Language dropdown */
    .lang-menu {
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      background: var(--zs-panel);
      border: 1px solid var(--zs-border-strong);
      border-radius: 10px;
      padding: 4px;
      min-width: 180px;
      z-index: 50;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
    }
    .lang-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      color: var(--zs-text);
      cursor: pointer;
      transition: background 0.1s;
      width: 100%;
      background: transparent;
      border: none;
      text-align: left;
    }
    .lang-item:hover { background: var(--zs-evidence-bg); }
    .lang-item.active { color: var(--zs-cyan); }
    .lang-item .code { color: var(--zs-muted); font-size: 12px; font-weight: 500; }

    /* Sticky header backdrop */
    .header-shell {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* Print styles */
    @media print {
      :root, [data-theme="dark"], [data-theme="light"] {
        --zs-bg: #ffffff;
        --zs-panel: #ffffff;
        --zs-card: #ffffff;
        --zs-border: #d1d5db;
        --zs-border-strong: #9ca3af;
        --zs-text: #0a1429;
        --zs-muted: #4b5563;
        --zs-logo-fill: #236bf5;
        --zs-evidence-bg: #f9fafb;
      }
      html, body { background: #ffffff !important; color: #0a1429 !important; }
      .no-print { display: none !important; }
      .grad-text {
        -webkit-text-fill-color: #0a1429 !important;
        color: #0a1429 !important;
        background: none !important;
      }
      .pill-critical { background: #fee2e2 !important; color: #991b1b !important; border-color: #fca5a5 !important; }
      .pill-warning  { background: #fef3c7 !important; color: #92400e !important; border-color: #fcd34d !important; }
      .pill-info     { background: #cffafe !important; color: #155e75 !important; border-color: #67e8f9 !important; }
      .pill-neutral, .pill-heuristic { background: #f3f4f6 !important; color: #374151 !important; border-color: #d1d5db !important; }
      .pill-fw-nist { background: #f1f5f9 !important; color: #334155 !important; border-color: #cbd5e1 !important; }
      .pill-fw-cis  { background: #dbeafe !important; color: #1e40af !important; border-color: #93c5fd !important; }
      .disclaimer-banner { background: #f8fafc !important; color: #4b5563 !important; border-color: #cbd5e1 !important; border-left-color: #0891b2 !important; }
      .stat-num.critical { color: #b91c1c !important; }
      .stat-num.warning  { color: #b45309 !important; }
      .stat-num.info     { color: #0e7490 !important; }
      .stat-num.neutral  { color: #4b5563 !important; }
      .stat-card { box-shadow: none !important; }
      .stat-card.active { box-shadow: none !important; }
      .evidence-item { background: #f9fafb !important; color: #374151 !important; }
      [data-content] { display: block !important; }
      .finding-card { page-break-inside: avoid; border: 1px solid #d1d5db !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- The agent replaces the placeholder below with the audit JSON.
       Schema:
         { audited_at, inventory,
           findings: [ { id, category, severity, title, evidence[], docRef, remediation, heuristic,
                         frameworks?: { nist80053r5?: string[], cisV8?: string[] } } ] }
  -->
  <script type="application/json" id="audit-data">{"audited_at":"2026-05-07T14:32:00Z","inventory":"Inventoried: 4 connector groups, 23 connectors, 12 server groups, 8 segment groups, 30 application segments, 14 access policy rules, 3 forwarding policy rules, 2 timeout policy rules, 2 LSS configs.","findings":[{"id":"sg-no-ac-group","category":"ServerGroups","severity":"critical","title":"Server group has no app connector group bound","evidence":["sg-finance-prod (id 72057594037961234)","sg-legacy-erp (id 72057594037961567)"],"docRef":"\u00a7Server Groups, page 14","remediation":"Bind at least one app connector group to each server group, otherwise traffic destined for the bound application segments will fail to forward. Use the zpa/update-server-group skill.","heuristic":false,"frameworks":{"nist80053r5":["CM-6","CM-2"],"cisV8":["4.1"]}},{"id":"seg-double-wildcard","category":"Segments","severity":"critical","title":"Application segment uses an overly broad wildcard domain","evidence":["seg-discovery-catchall (domain *.* )"],"docRef":"\u00a7Application Segments, page 22","remediation":"Replace `*.*` with explicit FQDNs or a `*.<your-domain>` wildcard. A double-wildcard segment will match every DNS query and steal traffic intended for other segments.","heuristic":false,"frameworks":{"nist80053r5":["AC-4","AC-6","SC-7"],"cisV8":["4.1","12.2"]}},{"id":"ap-block-all-bottom","category":"AccessPolicy","severity":"critical","title":"Access policy is missing a final deny-all rule","evidence":["Last rule in policy: rule-allow-corp-vpn-fallback (action ALLOW)"],"docRef":"\u00a7Access Policy class H, page 28","remediation":"Add an explicit DENY rule at the bottom of the access policy with no scoping conditions. Without it, evaluation falls through to the implicit allow on some legacy ZCC builds. Use the zpa/create-access-policy-rule skill.","heuristic":false,"frameworks":{"nist80053r5":["AC-3","AC-6","AC-4"],"cisV8":["6.7","4.1"]}},{"id":"ap-posture-per-os","category":"AccessPolicy","severity":"critical","title":"POSTURE rule does not cover all five OS platforms","evidence":["rule-require-posture-windows (covers: Windows, macOS \u2014 missing: iOS, Android, Linux)"],"docRef":"\u00a7Posture profiles per platform, page 30","remediation":"Add the same POSTURE condition for the missing platforms, or scope the rule to a CLIENT_TYPE that excludes them. Otherwise iOS, Android, and Linux clients silently bypass this posture check.","heuristic":false,"frameworks":{"nist80053r5":["IA-3","CM-6","AC-3"],"cisV8":["4.7","13.1"]}},{"id":"fp-no-double-wildcard","category":"ForwardingPolicy","severity":"critical","title":"Forwarding policy contains an overly broad INTERCEPT rule","evidence":["fwd-intercept-everything (matches CIDR 10.0.0.0/8)"],"docRef":"\u00a7Forwarding Policy, page 36","remediation":"Scope INTERCEPT rules to specific app segments or narrower CIDRs. Intercepting an entire /8 forwards far more user traffic into ZPA than intended and can mask outbound issues.","heuristic":false,"frameworks":{"nist80053r5":["AC-4","CA-3","SC-7"],"cisV8":["12.2"]}},{"id":"acg-n-plus-one","category":"Connectors","severity":"warning","title":"App connector group runs below N+1 redundancy","evidence":["acg-emea-west (1 connector)","acg-apac-singapore (1 connector)"],"docRef":"\u00a7App Connectors Redundancy and Scaling, page 11","remediation":"Deploy a second connector in each group so a single instance failure does not break access. Live load (CPU / bandwidth) is in the Cannot Audit section \u2014 confirm sizing from your hypervisor metrics.","heuristic":false,"frameworks":{"nist80053r5":["CP-2","CP-7","SC-5"],"cisV8":["11.1","11.2"]}},{"id":"acg-cert-expiring","category":"Connectors","severity":"warning","title":"Connector enrollment certificates expiring within 30 days","evidence":["connector-emea-west-01 (expires 2026-05-21)","connector-apac-sg-02 (expires 2026-05-29)"],"docRef":"\u00a7Connector Enrollment Certificate, page 13","remediation":"Re-enroll the affected connectors before expiry to avoid a sudden tunnel drop. The current enrollment cert is exposed on the connector group detail; renewal is automatic for connectors that re-checkin in time.","heuristic":false,"frameworks":{"nist80053r5":["SC-12","SC-17"],"cisV8":["3.11","12.6"]}},{"id":"sg-overly-broad","category":"ServerGroups","severity":"warning","title":"Server group binds every app connector group in the tenant","evidence":["sg-internal-tools (binds all 4 connector groups)"],"docRef":"\u00a7Server Groups, page 15","remediation":"Limit each server group to the connector groups that are actually closest to the backend hosts. Binding all groups defeats geo-routing and can produce noisy health alarms.","heuristic":true,"frameworks":{"nist80053r5":["AC-4","SC-7"],"cisV8":["4.1","12.2"]}},{"id":"seg-health-discovery","category":"Segments","severity":"warning","title":"Discovery wildcard segment has health reporting enabled","evidence":["seg-discovery-internal (domain *.corp.acme.local, health_reporting=ON_ACCESS)"],"docRef":"\u00a7Health Reporting Recommendations, page 23","remediation":"Set `health_reporting` to `NONE` on discovery / wildcard segments. Health probing every wildcard target floods the connectors and produces a stream of false negatives.","heuristic":false,"frameworks":{"nist80053r5":["CM-7","AU-12"],"cisV8":["8.2"]}},{"id":"ap-contractor-pair","category":"AccessPolicy","severity":"warning","title":"Contractor SCIM group is allowed without a paired block-rest rule","evidence":["rule-allow-contractors-jira (SCIM group: contractors-eng)"],"docRef":"\u00a7Access Policy class C/C', page 26","remediation":"Add a paired DENY rule for the same SCIM group so that contractors only reach the explicitly allowed segments. Without it, the broader rules below this allow may grant unintended access.","heuristic":true,"frameworks":{"nist80053r5":["AC-2","AC-3","AC-6"],"cisV8":["6.1","6.2"]}},{"id":"fp-bypass-coverage","category":"ForwardingPolicy","severity":"warning","title":"Canonical bypass list is incomplete","evidence":["Missing: *.windowsupdate.microsoft.com","Missing: ocsp.* (OCSP CRL responders)"],"docRef":"\u00a7Canonical Bypass List, page 37","remediation":"Add BYPASS rules for the missing canonical destinations so that Windows Update and OCSP/CRL traffic does not get forwarded into ZPA and stalled by inspection. Use the zpa/create-forwarding-policy-rule skill.","heuristic":false,"frameworks":{"nist80053r5":["SC-7","CA-3"],"cisV8":["12.2"]}},{"id":"tp-auth-range","category":"TimeoutPolicy","severity":"warning","title":"Reauth timeout is outside the recommended 24h\u20137d window","evidence":["tp-default (reauth_timeout=30 days)"],"docRef":"\u00a7Timeout Policies, page 38","remediation":"Reduce `reauth_timeout` to between 24 hours and 7 days, depending on how strict the user re-verification cadence needs to be. 30 days is well outside the baseline window.","heuristic":false,"frameworks":{"nist80053r5":["AC-12","IA-11"],"cisV8":["6.4"]}},{"id":"lss-tls-enabled","category":"LSS","severity":"warning","title":"LSS config streams logs over plain TCP","evidence":["lss-audit-to-splunk (use_tls=false, host=splunk-hf.acme.local:5514)"],"docRef":"\u00a7Log Streaming Service, page 39","remediation":"Enable TLS on the LSS config and re-deploy the LSS connector with the corresponding root CA. Plain TCP between the LSS connector and the SIEM forwarder is only acceptable inside fully isolated networks.","heuristic":false,"frameworks":{"nist80053r5":["SC-8","SC-13"],"cisV8":["3.10"]}},{"id":"lss-baseline-feeds","category":"LSS","severity":"warning","title":"Baseline LSS feeds are not all configured","evidence":["Configured: zpn_trans_log (User Activity), zpn_audit_log (Audit Logs)","Missing: zpn_auth_log (User Status)","Missing: zpn_ast_auth_log (App Connector Status)","Missing: zpn_ast_comprehensive_stats (App Connector Metrics)"],"docRef":"\u00a7Log Streaming Service, page 39","remediation":"Add LSS configs for the missing baseline feeds so the SIEM has a complete picture (user status changes, connector health, and connector metrics). Each feed is a separate LSS config.","heuristic":false,"frameworks":{"nist80053r5":["AU-2","AU-3","AU-12"],"cisV8":["8.2","8.5"]}},{"id":"acg-geo-coords","category":"Connectors","severity":"info","title":"App connector group is missing geo-routing coordinates","evidence":["acg-apac-singapore (latitude/longitude empty)"],"docRef":"\u00a7Geo-routing, page 12","remediation":"Populate latitude and longitude on every connector group so that ZCC can pick the closest entry point. The default routing fallback is acceptable but produces longer tail latencies.","heuristic":false},{"id":"seg-ip-only","category":"Segments","severity":"info","title":"Application segments addressed only by IP / CIDR","evidence":["seg-legacy-jenkins (10.42.7.18)","seg-legacy-jira (10.42.7.21)"],"docRef":"\u00a7Application Segments, page 21","remediation":"Migrate IP-only segments to FQDNs once the backend hosts have stable DNS. FQDN segments survive backend re-IPs and pair correctly with dynamic discovery server groups.","heuristic":false,"frameworks":{"nist80053r5":["CM-8"],"cisV8":["2.1"]}},{"id":"ap-deception-present","category":"AccessPolicy","severity":"info","title":"Deception rule is present in the access policy","evidence":["rule-deception-decoy-honeypot (auto-provisioned)"],"docRef":"\u00a7Access Policy class A, page 25","remediation":"Informational. Deception rules are auto-provisioned when the Deception license is enabled. Do not modify or remove unless coordinating with your Zscaler Deception admin.","heuristic":false,"frameworks":{"nist80053r5":["SC-26","SI-4"],"cisV8":["13.6"]}},{"id":"lss-filter-applied","category":"LSS","severity":"info","title":"LSS config has no status-code filter applied","evidence":["lss-audit-to-splunk (filter is empty \u2014 streams every status code)"],"docRef":"\u00a7Log Streaming Service, page 40","remediation":"Apply a status-code allowlist to limit catch-all streaming. Streaming every code can inflate SIEM ingest cost without improving signal \u2014 start with the codes the SIEM detection rules actually use.","heuristic":false,"frameworks":{"nist80053r5":["AU-4"],"cisV8":["8.3"]}},{"id":"ca-connector-cpu","category":"CannotAudit","severity":"cannotAudit","title":"Per-connector CPU / memory / throughput","evidence":[],"docRef":"\u00a7App Connectors Redundancy and Scaling, page 11","remediation":"No telemetry API. Use hypervisor / cloud-provider metrics out-of-band to confirm each connector has headroom \u2014 the N+1 check above counts connectors only, not load.","heuristic":false,"frameworks":{"nist80053r5":["SI-4","AU-12"],"cisV8":["8.11"]}},{"id":"ca-app-probes","category":"CannotAudit","severity":"cannotAudit","title":"App probe results / per-target reachability","evidence":[],"docRef":"\u00a7Health Reporting Recommendations, page 19","remediation":"No health API. The audit can only verify the configured `health_reporting` mode, not whether the probes are succeeding. Confirm reachability through the ZPA admin portal.","heuristic":false,"frameworks":{"nist80053r5":["SI-4","CP-2"],"cisV8":["11.1"]}},{"id":"ca-lss-delivery","category":"CannotAudit","severity":"cannotAudit","title":"LSS log delivery / drops / SIEM ingestion health","evidence":[],"docRef":"\u00a7Log Streaming Service Recommendations, page 39","remediation":"LSS API is configuration-only. Monitor delivery, drops, and ingest lag from the SIEM side \u2014 Zscaler does not surface in-flight LSS telemetry.","heuristic":false,"frameworks":{"nist80053r5":["AU-5","AU-9"],"cisV8":["8.2","8.5"]}},{"id":"ca-bandwidth","category":"CannotAudit","severity":"cannotAudit","title":"AC group bandwidth utilization (live N+1 sizing)","evidence":[],"docRef":"\u00a7App Connectors Redundancy and Scaling, page 11","remediation":"No traffic-stats API. The N+1 check counts connectors only \u2014 confirm bandwidth headroom through your hypervisor or cloud provider's network metrics.","heuristic":false,"frameworks":{"nist80053r5":["SC-5","CP-2"],"cisV8":["11.1"]}},{"id":"ca-sessions","category":"CannotAudit","severity":"cannotAudit","title":"Active session counts per app segment (idle-timeout sizing)","evidence":[],"docRef":"\u00a7Timeout Policies Recommendations, page 38","remediation":"No session-stats API. Idle-timeout sizing in this audit is informed by app class only, not measured load. Pull session counts from the ZPA admin portal if you need to tune timeouts to actual usage.","heuristic":false,"frameworks":{"nist80053r5":["AC-12","SI-4"],"cisV8":["6.4"]}}]}</script>

      const label = theme === 'dark' ? t.toLight : t.toDark;
      return (
        <button onClick={onToggle} className="icon-btn no-print" aria-label={label} title={label}>
          {theme === 'dark' ? <IconSun /> : <IconMoon />}
        </button>
      );
    }

    function LanguageMenu({ lang, onChange, t }) {
      const [open, setOpen] = useState(false);
      const wrapRef = useRef(null);
      useEffect(() => {
        function handler(e) {
          if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
        }
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);
      const current = LANGUAGES.find(l => l[0] === lang) || LANGUAGES[0];
      return (
        <div ref={wrapRef} className="relative no-print">
          <button onClick={() => setOpen(o => !o)} className="icon-btn" aria-label={t.language} title={t.language} style={{ width: 'auto', padding: '0 10px', gap: 6 }}>
            <IconGlobe />
            <span className="text-[12px] font-semibold ml-1">{current[2]}</span>
          </button>
          {open && (
            <div className="lang-menu" role="menu">
              {LANGUAGES.map(([code, name, short]) => (
                <button
                  key={code}
                  className={'lang-item ' + (code === lang ? 'active' : '')}
                  onClick={() => { onChange(code); setOpen(false); }}
                  role="menuitemradio"
                  aria-checked={code === lang}
                >
                  <span>{name}</span>
                  <span className="code">{short}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    function StatCard({ label, count, severity, active, onClick }) {
      return (
        <button onClick={onClick} className={'stat-card ' + (active ? 'active' : '')} aria-pressed={active}>
          <div className="text-xs uppercase tracking-wide text-[var(--zs-muted)] mb-2">{label}</div>
          <div className={'stat-num ' + severity}>{count}</div>
        </button>
      );
    }

    function FindingCard({ f, open, onToggle, t }) {
      const SEV_LABEL = { critical: t.critical, warning: t.warning, info: t.info, cannotAudit: t.cannotAudit };
      return (
        <div className={'finding-card ' + (SEV_BORDER[f.severity] || '')}>
          <div onClick={onToggle} className="p-5 cursor-pointer select-none">
            <div className="flex items-start justify-between gap-4">
              <div className="flex items-center gap-2 flex-wrap min-w-0">
                <span className={SEV_PILL[f.severity] || 'pill pill-neutral'}>{SEV_LABEL[f.severity] || f.severity}</span>
                <span className="pill pill-neutral">{f.category}</span>
                {f.heuristic && <span className="pill pill-heuristic">{t.heuristic}</span>}
                <code className="text-xs text-[var(--zs-muted)] font-mono">{f.id}</code>
              </div>
              <span className="toggle-icon no-print shrink-0">{open ? '−' : '+'}</span>
            </div>
            <div className="font-semibold text-[15px] mt-2 text-[var(--zs-text)]">{f.title}</div>
          </div>
          <div data-content className={open ? 'block' : 'hidden'}>
            <div className="px-5 pb-5 space-y-4 border-t border-[var(--zs-border)] pt-4">
              {f.docRef && (
                <div className="text-xs text-[var(--zs-muted)]">
                  <span className="uppercase tracking-wide">{t.docReference}</span> · <span className="text-[var(--zs-text)]">{f.docRef}</span>
                </div>
              )}
              {f.evidence && f.evidence.length > 0 && (
                <div>
                  <div className="text-xs uppercase tracking-wide text-[var(--zs-muted)] mb-2">{t.evidence} ({f.evidence.length})</div>
                  <div className="space-y-2">
                    {f.evidence.map((e, i) => <div key={i} className="evidence-item">{e}</div>)}
                  </div>
                </div>
              )}
              {f.remediation && (
                <div>
                  <div className="text-xs uppercase tracking-wide text-[var(--zs-muted)] mb-2">{t.remediation}</div>
                  <div className="text-sm text-[var(--zs-text)] leading-relaxed">{f.remediation}</div>
                </div>
              )}
              {f.frameworks && ((f.frameworks.nist80053r5 && f.frameworks.nist80053r5.length > 0) || (f.frameworks.cisV8 && f.frameworks.cisV8.length > 0)) && (
                <div>
                  <div className="text-xs uppercase tracking-wide text-[var(--zs-muted)] mb-2">{t.frameworks}</div>
                  <div className="flex flex-wrap items-center gap-2">
                    {f.frameworks.nist80053r5 && f.frameworks.nist80053r5.length > 0 && (
                      <>
                        <span className="text-[11px] text-[var(--zs-muted)] uppercase tracking-wide font-semibold">{t.nistLabel}</span>
                        {f.frameworks.nist80053r5.map(c => (
                          <span key={'n-' + c} className="pill pill-fw-nist">{c}</span>
                        ))}
                      </>
                    )}
                    {f.frameworks.cisV8 && f.frameworks.cisV8.length > 0 && (
                      <>
                        {f.frameworks.nist80053r5 && f.frameworks.nist80053r5.length > 0 && <span className="text-[var(--zs-muted)]">·</span>}
                        <span className="text-[11px] text-[var(--zs-muted)] uppercase tracking-wide font-semibold">{t.cisLabel}</span>
                        {f.frameworks.cisV8.map(c => (
                          <span key={'c-' + c} className="pill pill-fw-cis">{c}</span>
                        ))}
                      </>
                    )}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ---------- main app ---------- */
    function App() {
      const initial = loadPrefs();
      const [theme, setTheme] = useState(initial.theme === 'light' ? 'light' : 'dark');
      const [lang, setLang]   = useState(TRANSLATIONS[initial.lang] ? initial.lang : 'en');
      const [search, setSearch]     = useState('');
      const [category, setCategory] = useState('All');
      const [severity, setSeverity] = useState('All');
      const [framework, setFramework] = useState('All');
      const [openIds, setOpenIds] = useState(
        () => new Set(data.findings.filter(f => f.severity === 'critical').map(f => f.id))
      );

      const t = TRANSLATIONS[lang] || TRANSLATIONS.en;

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.lang = lang;
        savePrefs({ theme, lang });
      }, [theme, lang]);

      const counts = useMemo(() => {
        const c = { critical: 0, warning: 0, info: 0, cannotAudit: 0 };
        data.findings.forEach(f => { c[f.severity] = (c[f.severity] || 0) + 1; });
        return c;
      }, []);
      const categoryCounts = useMemo(() => {
        const c = {};
        data.findings.forEach(f => { c[f.category] = (c[f.category] || 0) + 1; });
        return c;
      }, []);
      const frameworkCounts = useMemo(() => {
        const c = { nist80053r5: 0, cisV8: 0 };
        data.findings.forEach(f => {
          if (f.frameworks && Array.isArray(f.frameworks.nist80053r5) && f.frameworks.nist80053r5.length) c.nist80053r5++;
          if (f.frameworks && Array.isArray(f.frameworks.cisV8)       && f.frameworks.cisV8.length)       c.cisV8++;
        });
        return c;
      }, []);
      const filtered = useMemo(() => {
        const q = search.trim().toLowerCase();
        return data.findings
          .filter(f => category === 'All' || f.category === category)
          .filter(f => severity === 'All' || f.severity === severity)
          .filter(f => findingHasFramework(f, framework))
          .filter(f => {
            if (!q) return true;
            const fwParts = [];
            if (f.frameworks) {
              if (f.frameworks.nist80053r5) fwParts.push(...f.frameworks.nist80053r5);
              if (f.frameworks.cisV8)       fwParts.push(...f.frameworks.cisV8);
            }
            const hay = [f.id, f.title, f.category, f.severity, f.docRef, f.remediation, ...(f.evidence || []), ...fwParts]
              .filter(Boolean).join(' ').toLowerCase();
            return hay.includes(q);
          })
          .sort((a, b) =>
            (SEV_RANK[a.severity] ?? 9) - (SEV_RANK[b.severity] ?? 9)
            || a.title.localeCompare(b.title)
          );
      }, [search, category, severity, framework]);

      const toggle = (id) => {
        setOpenIds(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id); else next.add(id);
          return next;
        });
      };
      const expandAll = () => setOpenIds(new Set(filtered.map(f => f.id)));
      const collapseAll = () => setOpenIds(new Set());
      const onStat = (sev) => setSeverity(prev => prev === sev ? 'All' : sev);

      const SEV_LABEL_FULL = { All: t.all, critical: t.critical, warning: t.warning, info: t.info, cannotAudit: t.cannotAudit };

      return (
        <div className="min-h-screen">
          <header className="panel border-b sticky top-0 z-20 header-shell">
            <div className="w-full px-6 py-3 flex items-center justify-between gap-4 flex-wrap">
              <div className="flex items-center gap-4 min-w-0">
                <ZscalerLogo />
                <div className="h-6 w-px bg-[var(--zs-border-strong)]" />
                <div className="text-sm font-medium text-[var(--zs-text)] truncate">{t.headerSub}</div>
              </div>
              <div className="flex items-center gap-2 no-print">
                <button onClick={expandAll} className="filter-chip">{t.expandAll}</button>
                <button onClick={collapseAll} className="filter-chip">{t.collapseAll}</button>
                <div className="h-6 w-px bg-[var(--zs-border-strong)] mx-1" />
                <LanguageMenu lang={lang} onChange={setLang} t={t} />
                <ThemeToggle theme={theme} onToggle={() => setTheme(theme === 'dark' ? 'light' : 'dark')} t={t} />
                <button onClick={() => window.print()} className="btn-primary">{t.printSavePdf}</button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            <section className="mb-10">
              <h1 className="text-4xl md:text-5xl font-bold mb-3 tracking-tight">
                <span className="grad-text">{t.headerSub}</span>
              </h1>
              <div className="text-[var(--zs-muted)] text-sm space-y-1 max-w-3xl">
                <div><span className="text-[var(--zs-text)] font-medium">{t.audited}:</span> {data.audited_at}</div>
                <div><span className="text-[var(--zs-text)] font-medium">{t.reference}:</span> {t.referenceDoc}</div>
                <div className="italic pt-1">{t.readOnly}</div>
              </div>
              <div className="disclaimer-banner mt-5 max-w-3xl">{t.disclaimer}</div>
            </section>

            <section className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
              <StatCard label={t.critical}    count={counts.critical}    severity="critical" active={severity === 'critical'}    onClick={() => onStat('critical')} />
              <StatCard label={t.warning}     count={counts.warning}     severity="warning"  active={severity === 'warning'}     onClick={() => onStat('warning')} />
              <StatCard label={t.info}        count={counts.info}        severity="info"     active={severity === 'info'}        onClick={() => onStat('info')} />
              <StatCard label={t.cannotAudit} count={counts.cannotAudit} severity="neutral"  active={severity === 'cannotAudit'} onClick={() => onStat('cannotAudit')} />
            </section>

            {data.inventory && (
              <section className="panel rounded-xl p-4 mb-8 text-sm">
                <div className="text-xs uppercase tracking-wide text-[var(--zs-muted)] mb-2">{t.inventory}</div>
                <div className="text-[var(--zs-text)]">{data.inventory}</div>
              </section>
            )}

            <section className="panel rounded-xl p-5 mb-6 no-print">
              <div className="space-y-4">
                <div>
                  <div className="text-xs uppercase tracking-wide text-[var(--zs-muted)] mb-2">{t.search}</div>
                  <input
                    className="search-input"
                    placeholder={t.searchPh}
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                  />
                </div>
                <div>
                  <div className="text-xs uppercase tracking-wide text-[var(--zs-muted)] mb-2">{t.category}</div>
                  <div className="flex flex-wrap gap-2">
                    {CATEGORIES.map(c => {
                      const n = c === 'All' ? data.findings.length : (categoryCounts[c] || 0);
                      const label = c === 'All' ? t.all : c;
                      return (
                        <button key={c} className={'filter-chip ' + (category === c ? 'active' : '')} onClick={() => setCategory(c)}>
                          {label} <span className="ml-1 opacity-60">({n})</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
                <div>
                  <div className="text-xs uppercase tracking-wide text-[var(--zs-muted)] mb-2">{t.severity}</div>
                  <div className="flex flex-wrap gap-2">
                    {SEVERITIES.map(s => {
                      const n = s === 'All' ? data.findings.length : (counts[s] || 0);
                      return (
                        <button key={s} className={'filter-chip ' + (severity === s ? 'active' : '')} onClick={() => setSeverity(s)}>
                          {SEV_LABEL_FULL[s]} <span className="ml-1 opacity-60">({n})</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
                <div>
                  <div className="text-xs uppercase tracking-wide text-[var(--zs-muted)] mb-2">{t.framework}</div>
                  <div className="flex flex-wrap gap-2">
                    {FRAMEWORKS.map(fw => {
                      const label = fw === 'All' ? t.all : (fw === 'nist80053r5' ? t.nistLabel : t.cisLabel);
                      const n = fw === 'All' ? data.findings.length : (frameworkCounts[fw] || 0);
                      return (
                        <button key={fw} className={'filter-chip ' + (framework === fw ? 'active' : '')} onClick={() => setFramework(fw)}>
                          {label} <span className="ml-1 opacity-60">({n})</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            </section>

            <section className="space-y-3">
              <div className="text-xs uppercase tracking-wide text-[var(--zs-muted)] mb-2 no-print">
                {t.showing} {filtered.length} {t.of} {data.findings.length} {t.findings}
              </div>
              {filtered.length === 0 && (
                <div className="card rounded-xl p-8 text-center text-[var(--zs-muted)]">
                  {t.noResults}
                </div>
              )}
              {filtered.map(f => (
                <FindingCard key={f.id} f={f} open={openIds.has(f.id)} onToggle={() => toggle(f.id)} t={t} />
              ))}
            </section>

            <footer className="mt-12 pt-6 border-t border-[var(--zs-border)] text-xs text-[var(--zs-muted)] text-center">
              {t.footer1} <code className="font-mono">zpa-audit-baseline-compliance</code> {t.footer2}<br />
              {t.referenceDoc}
            </footer>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
