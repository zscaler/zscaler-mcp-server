  :root, [data-theme="dark"] {
    --zs-bg: #050912;
    --zs-panel: #0d1426;
    --zs-card: #131c33;
    --zs-border: rgba(255, 255, 255, 0.08);
    --zs-border-strong: rgba(255, 255, 255, 0.16);
    --zs-text: #e6eaf3;
    --zs-muted: #8a93a8;
    --zs-logo-fill: #ffffff;
    --zs-cyan: #3cc0e5;
    --zs-blue: #4a7cff;
    --zs-purple: #8a5cff;
    --zs-good-bg: rgba(34, 197, 94, 0.08);
    --zs-warn-bg: rgba(245, 158, 11, 0.08);
    --zs-bad-bg:  rgba(239, 68, 68, 0.10);
    --zs-row-hover: rgba(60, 192, 229, 0.05);
    --zs-evidence-bg: rgba(255, 255, 255, 0.03);
    --zs-chip-active-bg: linear-gradient(90deg, rgba(60, 192, 229, 0.18), rgba(74, 124, 255, 0.18));
  }
  [data-theme="light"] {
    --zs-bg: #f4f6fb;
    --zs-panel: #ffffff;
    --zs-card: #ffffff;
    --zs-border: rgba(15, 23, 42, 0.08);
    --zs-border-strong: rgba(15, 23, 42, 0.18);
    --zs-text: #0a1429;
    --zs-muted: #4b5563;
    --zs-logo-fill: #236bf5;
    --zs-cyan: #0ea5e9;
    --zs-blue: #2563eb;
    --zs-purple: #7c3aed;
    --zs-good-bg: rgba(34, 197, 94, 0.07);
    --zs-warn-bg: rgba(245, 158, 11, 0.07);
    --zs-bad-bg:  rgba(239, 68, 68, 0.07);
    --zs-row-hover: rgba(14, 165, 233, 0.06);
    --zs-evidence-bg: rgba(15, 23, 42, 0.03);
    --zs-chip-active-bg: linear-gradient(90deg, rgba(14, 165, 233, 0.12), rgba(37, 99, 235, 0.12));
  }
  html, body {
    background: var(--zs-bg);
    color: var(--zs-text);
    font-family: 'Inter', 'Noto Sans JP', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }
  .grad-text {
    background: linear-gradient(90deg, var(--zs-cyan) 0%, var(--zs-blue) 50%, var(--zs-purple) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .panel { background: var(--zs-panel); border: 1px solid var(--zs-border); }
  .card  { background: var(--zs-card);  border: 1px solid var(--zs-border); }

  .zs-logo { height: 28px; width: auto; color: var(--zs-logo-fill); display: block; }

  /* Pills */
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.03em; text-transform: uppercase; white-space: nowrap;
  }
  .pill-critical { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); }
  .pill-warning  { background: rgba(245, 158, 11, 0.15); color: #d97706; border: 1px solid rgba(245, 158, 11, 0.4); }
  .pill-good     { background: rgba(34, 197, 94, 0.15);  color: #16a34a; border: 1px solid rgba(34, 197, 94, 0.4); }
  .pill-info     { background: rgba(6, 182, 212, 0.15);  color: #0891b2; border: 1px solid rgba(6, 182, 212, 0.4); }
  .pill-neutral  { background: rgba(138, 147, 168, 0.12); color: var(--zs-muted); border: 1px solid var(--zs-border); }
  [data-theme="dark"] .pill-critical { color: #fca5a5; }
  [data-theme="dark"] .pill-warning  { color: #fcd34d; }
  [data-theme="dark"] .pill-good     { color: #86efac; }
  [data-theme="dark"] .pill-info     { color: #67e8f9; }

  /* Filter chips */
  .filter-chip {
    padding: 6px 12px; border-radius: 8px; font-size: 13px;
    border: 1px solid var(--zs-border); background: transparent; color: var(--zs-muted);
    cursor: pointer; transition: all 0.15s;
  }
  .filter-chip:hover { color: var(--zs-text); border-color: var(--zs-cyan); }
  .filter-chip.active {
    background: var(--zs-chip-active-bg); color: var(--zs-text); border-color: var(--zs-cyan);
  }

  /* Stat cards */
  .stat-card {
    background: var(--zs-card); border: 1px solid var(--zs-border);
    border-radius: 12px; padding: 18px; text-align: left; width: 100%;
    cursor: pointer; transition: all 0.15s;
  }
  .stat-card.readonly { cursor: default; }
  .stat-card:hover:not(.readonly) { border-color: var(--zs-border-strong); transform: translateY(-1px); }
  .stat-card.active { border-color: var(--zs-cyan); box-shadow: 0 0 0 1px rgba(60, 192, 229, 0.6); }
  .stat-num { font-size: 32px; font-weight: 700; line-height: 1; }
  .stat-num.critical { color: #ef4444; }
  .stat-num.warning  { color: #d97706; }
  .stat-num.good     { color: #16a34a; }
  .stat-num.info     { color: #0891b2; }
  .stat-num.neutral  { color: var(--zs-text); }
  [data-theme="dark"] .stat-num.critical { color: #fca5a5; }
  [data-theme="dark"] .stat-num.warning  { color: #fcd34d; }
  [data-theme="dark"] .stat-num.good     { color: #86efac; }
  [data-theme="dark"] .stat-num.info     { color: #67e8f9; }
  .stat-sub { font-size: 13px; color: var(--zs-muted); margin-top: 4px; word-break: break-word; }

  /* Buttons */
  .btn-primary {
    background: linear-gradient(90deg, var(--zs-cyan), var(--zs-blue));
    color: #ffffff; font-weight: 600;
    padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px; font-size: 13px;
  }
  .btn-primary:hover { opacity: 0.9; }
  .icon-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 8px;
    border: 1px solid var(--zs-border); background: transparent;
    color: var(--zs-muted); cursor: pointer; transition: all 0.15s;
  }
  .icon-btn:hover { color: var(--zs-text); border-color: var(--zs-cyan); }
  .icon-btn .icon { width: 18px; height: 18px; }

  /* Search input */
  .search-input {
    background: var(--zs-panel); border: 1px solid var(--zs-border);
    color: var(--zs-text); padding: 10px 14px; border-radius: 8px;
    width: 100%; font-size: 14px;
  }
  .search-input:focus { outline: none; border-color: var(--zs-cyan); }
  .search-input::placeholder { color: var(--zs-muted); }

  /* Data tables */
  .zs-table-wrap { background: var(--zs-card); border: 1px solid var(--zs-border); border-radius: 12px; overflow: hidden; }
  .zs-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  .zs-table thead th {
    background: var(--zs-panel); color: var(--zs-muted);
    text-align: left; font-weight: 600; font-size: 11px;
    letter-spacing: 0.05em; text-transform: uppercase;
    padding: 12px 14px; border-bottom: 1px solid var(--zs-border);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  .zs-table thead th:hover { color: var(--zs-text); }
  .zs-table tbody td {
    padding: 12px 14px; border-bottom: 1px solid var(--zs-border);
    color: var(--zs-text); vertical-align: middle;
  }
  .zs-table tbody tr:last-child td { border-bottom: none; }
  .zs-table tbody tr:hover { background: var(--zs-row-hover); }
  .zs-table tbody tr.row-critical { background: var(--zs-bad-bg); }
  .zs-table tbody tr.row-warning  { background: var(--zs-warn-bg); }
  .zs-table tbody tr.row-good     { background: var(--zs-good-bg); }
  .zs-table tbody tr.row-critical:hover,
  .zs-table tbody tr.row-warning:hover,
  .zs-table tbody tr.row-good:hover { filter: brightness(1.05); }

  /* Language dropdown */
  .lang-menu {
    position: absolute; right: 0; top: calc(100% + 6px);
    background: var(--zs-panel); border: 1px solid var(--zs-border-strong);
    border-radius: 10px; padding: 4px; min-width: 180px; z-index: 50;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
  }
  .lang-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-radius: 6px; font-size: 14px; color: var(--zs-text);
    cursor: pointer; transition: background 0.1s;
    width: 100%; background: transparent; border: none; text-align: left;
  }
  .lang-item:hover { background: var(--zs-evidence-bg); }
  .lang-item.active { color: var(--zs-cyan); }
  .lang-item .code { color: var(--zs-muted); font-size: 12px; font-weight: 500; }

  .header-shell { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

  /* Active-incident pill (header) */
  .incident-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(239, 68, 68, 0.18); color: #ef4444;
    border: 1px solid rgba(239, 68, 68, 0.45);
    padding: 4px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  [data-theme="dark"] .incident-pill { color: #fca5a5; }

  /* Scope summary bar */
  .scope-bar {
    background: linear-gradient(90deg, rgba(60, 192, 229, 0.07), rgba(74, 124, 255, 0.05));
    border: 1px solid var(--zs-border);
    border-left: 3px solid var(--zs-cyan);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--zs-text);
    display: flex; flex-wrap: wrap; gap: 18px; align-items: center;
  }
  .scope-bar .scope-item .lbl {
    color: var(--zs-muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em; font-size: 11px; margin-right: 4px;
  }

  /* Incident banner (red/pink, prose explanation) */
  .incident-banner {
    border-radius: 12px;
    padding: 14px 16px;
    display: flex; gap: 12px; align-items: flex-start;
    font-size: 14px; line-height: 1.55;
  }
  .incident-banner.severity-critical {
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.35);
    border-left: 3px solid #ef4444;
  }
  .incident-banner.severity-warning {
    background: rgba(245, 158, 11, 0.08);
    border: 1px solid rgba(245, 158, 11, 0.35);
    border-left: 3px solid #f59e0b;
  }
  .incident-banner .dot {
    width: 12px; height: 12px; border-radius: 50%;
    flex-shrink: 0; margin-top: 4px;
  }
  .incident-banner.severity-critical .dot { background: #ef4444; }
  .incident-banner.severity-warning  .dot { background: #f59e0b; }
  .incident-banner .title { font-weight: 700; margin-bottom: 4px; color: var(--zs-text); }
  .incident-banner .body  { color: var(--zs-muted); }

  /* KPI top-border accent (severity-coded) */
  .stat-card.accent-critical { border-top: 3px solid #ef4444; }
  .stat-card.accent-warning  { border-top: 3px solid #f59e0b; }
  .stat-card.accent-good     { border-top: 3px solid #22c55e; }
  .stat-card.accent-info     { border-top: 3px solid var(--zs-cyan); }

  /* Analysis section (paragraph + remediation list) */
  .analysis-section {
    background: var(--zs-card); border: 1px solid var(--zs-border);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 24px;
  }
  .analysis-section h3 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--zs-muted); margin-bottom: 8px; font-weight: 700;
  }
  .analysis-section p { color: var(--zs-text); line-height: 1.6; margin-bottom: 12px; }
  .analysis-section .remediation-list { padding-left: 18px; margin: 8px 0 0 0; }
  .analysis-section .remediation-list li { color: var(--zs-text); margin-bottom: 6px; line-height: 1.55; }

  /* Section heading */
  .section-h {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--zs-muted);
    margin: 0 0 12px 0;
  }

  /* Inline status text */
  .txt-critical { color: #ef4444; font-weight: 600; }
  .txt-warning  { color: #d97706; font-weight: 600; }
  .txt-good     { color: #16a34a; font-weight: 600; }
  [data-theme="dark"] .txt-critical { color: #fca5a5; }
  [data-theme="dark"] .txt-warning  { color: #fcd34d; }
  [data-theme="dark"] .txt-good     { color: #86efac; }

  /* Print */
  @media print {
    :root, [data-theme="dark"], [data-theme="light"] {
      --zs-bg: #ffffff; --zs-panel: #ffffff; --zs-card: #ffffff;
      --zs-border: #d1d5db; --zs-border-strong: #9ca3af;
      --zs-text: #0a1429; --zs-muted: #4b5563; --zs-logo-fill: #236bf5;
      --zs-good-bg: #f0fdf4; --zs-warn-bg: #fffbeb; --zs-bad-bg: #fef2f2;
      --zs-evidence-bg: #f9fafb;
    }
    html, body { background: #ffffff !important; color: #0a1429 !important; }
    .no-print { display: none !important; }
    .grad-text { -webkit-text-fill-color: #0a1429 !important; color: #0a1429 !important; background: none !important; }
    .zs-table-wrap, .panel, .card, .stat-card { box-shadow: none !important; page-break-inside: avoid; }
  }
</style>

/* ---------------- Sub-components ---------------- */
function ThemeToggle({ theme, onToggle, t }) {
  const label = theme === 'dark' ? t('toLight') : t('toDark');

    <button onClick={onToggle} className="icon-btn no-print" aria-label={label} title={label}>

}

function LanguageMenu({ lang, onChange, t }) {
  const [open, setOpen] = useState(false);
  const wrapRef = useRef(null);
  useEffect(() => {
    function handler(e) { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);
  const current = LANGUAGES.find(l => l[0] === lang) || LANGUAGES[0];
  return (
    <div ref={wrapRef} className="relative no-print">
      <button onClick={() => setOpen(o => !o)} className="icon-btn" aria-label={t('language')} title={t('language')} style={{ width: 'auto', padding: '0 10px', gap: 6 }}>
        <IconGlobe />
        <span className="text-[12px] font-semibold ml-1">{current[2]}</span>
      </button>
      {open && (
        <div className="lang-menu" role="menu">
          {LANGUAGES.map(([code, name, short]) => (
            <button
              key={code}
              className={'lang-item ' + (code === lang ? 'active' : '')}
              onClick={() => { onChange(code); setOpen(false); }}
              role="menuitemradio"
              aria-checked={code === lang}
            >
              <span>{name}</span>
              <span className="code">{short}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function KpiCard({ kpi, raw, t, active, onClick }) {
  const isText = kpi.kind === 'text';
  const sev = kpi.severity || 'neutral';
  // Support raw being a primitive OR an object {value, sub, severity?}.
  const isObj = raw !== null && typeof raw === 'object';
  const value = isObj ? raw.value : raw;
  const sub   = isObj ? raw.sub   : null;
  const accentSev = (isObj && raw.severity) || sev;
  const display = (value === null || value === undefined) ? '—' :
                  (kpi.suffix ? value + kpi.suffix : value);
  return (
    <button
      type="button"
      onClick={onClick}
      className={'stat-card accent-' + accentSev + ' ' + (onClick ? '' : 'readonly ') + (active ? 'active' : '')}
      aria-pressed={!!active}
    >
      <div className="text-xs uppercase tracking-wide text-[var(--zs-muted)] mb-2">{t(kpi.labelKey)}</div>
      {isText ? (
        <div className={'text-[20px] font-semibold ' + (accentSev === 'good' ? 'txt-good' : accentSev === 'critical' ? 'txt-critical' : accentSev === 'warning' ? 'txt-warning' : 'text-[var(--zs-text)]')}>{display}</div>
      ) : (
        <div className={'stat-num ' + accentSev}>{display}</div>
      )}
      {sub && <div className="stat-sub">{sub}</div>}
    </button>
  );
}

function ScopeBar({ scope, t }) {
  if (!scope || typeof scope !== 'object') return null;
  const entries = Object.entries(scope).filter(([, v]) => v !== null && v !== undefined && v !== '');
  if (entries.length === 0) return null;
  return (
    <div className="scope-bar mb-5">
      {entries.map(([k, v]) => (
        <div key={k} className="scope-item">
          <span className="lbl">{t('scope_' + k) !== ('scope_' + k) ? t('scope_' + k) : k}:</span>
          <span>{v}</span>
        </div>
      ))}
    </div>
  );
}

function IncidentBanner({ incident }) {
  if (!incident) return null;
  const sev = incident.severity || 'critical';
  return (
    <div className={'incident-banner severity-' + sev + ' mb-6'} role="alert">
      <div className="dot" />
      <div>
        {incident.title && <div className="title">{incident.title}</div>}
        {incident.body && <div className="body">{incident.body}</div>}
      </div>

  );
}

function AnalysisSection({ analysis, t }) {
  if (!analysis) return null;
  return (
    <div className="analysis-section">
      {analysis.summary && (
        <>
          <h3>{t('analysis')}</h3>
          <p>{analysis.summary}</p>
        </>

        <>
          <h3>{t('rootCause')}</h3>
          <p>{analysis.rootCause}</p>
        </>
      )}

        </>
      )}

function rowSeverityClass(sev) {
  switch (sev) {
    case 'critical': return 'row-critical';
    case 'warning':  return 'row-warning';
    case 'good':     return 'row-good';
    default: return '';
  }
}

function StatusPill({ status }) {
  const s = (status || '').toString().toLowerCase();
  let cls = 'pill pill-neutral';
  if (['good', 'ok', 'current', 'top', 'active', 'completed', 'low'].includes(s)) cls = 'pill pill-good';
  else if (['okay', 'degraded', 'outdated', 'borderline', 'medium', 'warning'].includes(s)) cls = 'pill pill-warning';
  else if (['poor', 'critical', 'eol', 'high', 'fail', 'failed'].includes(s)) cls = 'pill pill-critical';
  else if (['info', 'resolved'].includes(s)) cls = 'pill pill-info';
  return <span className={cls}>{status}</span>;
}

function PriorityPill({ priority }) {
  const p = (priority || '').toString().toLowerCase();
  let cls = 'pill pill-neutral';
  if (p === 'high') cls = 'pill pill-critical';
  else if (p === 'medium') cls = 'pill pill-warning';
  else if (p === 'low') cls = 'pill pill-good';
  return <span className={cls}>{priority}</span>;
}

function RiskPill({ risk }) {
  const r = (risk || '').toString().toLowerCase();
  let cls = 'pill pill-neutral';
  if (r === 'critical' || r === 'high') cls = 'pill pill-critical';
  else if (r === 'medium') cls = 'pill pill-warning';
  else if (r === 'low') cls = 'pill pill-good';
  return <span className={cls}>{risk}</span>;
}

function AlertStatusPill({ status }) {
  const s = (status || '').toString().toLowerCase();
  let cls = 'pill pill-neutral';
  if (s === 'active') cls = 'pill pill-critical';
  else if (s === 'resolved') cls = 'pill pill-good';
  return <span className={cls}>{status}</span>;
}

function VerdictPill({ verdict }) {
  const v = (verdict || '').toString().toLowerCase();
  let cls = 'pill pill-neutral';
  if (v === 'shared') cls = 'pill pill-critical';
  else if (v === 'degraded') cls = 'pill pill-warning';
  else if (v === 'ok' || v === 'good') cls = 'pill pill-good';
  return <span className={cls}>{verdict}</span>;
}

function renderCell(col, row) {
  const v = row[col.key];
  if (col.kind === 'status')     return <StatusPill status={v} />;
  if (col.kind === 'priority')   return <PriorityPill priority={v} />;
  if (col.kind === 'risk')       return <RiskPill risk={v} />;
  if (col.kind === 'alertStatus')return <AlertStatusPill status={v} />;
  if (col.kind === 'verdict')    return <VerdictPill verdict={v} />;
  return v;
}

function DataTable({ tableSpec, rows, sortState, onSort, t, columnOverrides }) {
  return (
    <div className="zs-table-wrap mb-8">
      <div className="px-4 py-3 border-b border-[var(--zs-border)] flex items-center justify-between">
        <h2 className="text-sm font-semibold tracking-wide uppercase text-[var(--zs-muted)]">
          {t(tableSpec.titleKey)} <span className="text-[var(--zs-text)] ml-1">({rows.length})</span>
        </h2>
      </div>
      <div className="overflow-x-auto">
        <table className="zs-table">
          <thead>
            <tr>
              {tableSpec.columns.map(col => {
                const indicator = sortState && sortState.col === col.key ? (sortState.dir === 1 ? ' ▲' : ' ▼') : '';
                const override = columnOverrides && columnOverrides[col.key];
                const label = override || t(col.labelKey);
                return (
                  <th key={col.key} onClick={() => onSort(col.key)}>
                    {label}{indicator}
                  </th>
                );
              })}
            </tr>
          </thead>
          <tbody>
            {rows.length === 0 ? (
              <tr><td colSpan={tableSpec.columns.length} style={{ textAlign: 'center', padding: '32px', color: 'var(--zs-muted)' }}>{t('noResults')}</td></tr>
            ) : (
              rows.map((row, i) => (
                <tr key={i} className={rowSeverityClass(row[tableSpec.rowSeverityKey])}>
                  {tableSpec.columns.map(col => (
                    <td key={col.key}>{renderCell(col, row)}</td>
                  ))}
                </tr>
              ))
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function csvEscape(s) {
  const v = (s === null || s === undefined) ? '' : String(s);
  if (/[",\n]/.test(v)) return '"' + v.replace(/"/g, '""') + '"';
  return v;
}

function exportCSV(tableSpec, rows, t) {
  const header = tableSpec.columns.map(c => t(c.labelKey));
  const body = rows.map(r => tableSpec.columns.map(c => r[c.key]));
  const lines = [header, ...body].map(arr => arr.map(csvEscape).join(','));
  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (config.id || 'report') + '_' + tableSpec.id + '.csv';
  a.click();
}

/* ---------------- Main App ---------------- */
function App() {
  const prefs = loadPrefs();
  const [theme, setTheme] = useState(prefs.theme === 'light' ? 'light' : 'dark');
  const [lang, setLang]   = useState(SHARED_I18N[prefs.lang] ? prefs.lang : 'en');
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState(() => {
    const init = {};
    (config.filters || []).forEach(f => { init[f.name] = 'All'; });
    return init;
  });
  const [sortByTable, setSortByTable] = useState({});

  const t = makeTranslator(lang);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.lang = lang;
    savePrefs({ theme, lang });
  }, [theme, lang]);

  function setFilter(name, val) {
    setFilters(prev => ({ ...prev, [name]: val }));
  }

  function sortRows(tableSpec, rows) {
    const s = sortByTable[tableSpec.id];
    if (!s) return rows;
    const { col, dir } = s;
    return [...rows].sort((a, b) => {
      const av = a[col]; const bv = b[col];
      const an = parseFloat(av); const bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return (an - bn) * dir;
      return String(av).localeCompare(String(bv)) * dir;
    });
  }

  function onSort(tableId, col) {
    setSortByTable(prev => {
      const cur = prev[tableId];
      const dir = cur && cur.col === col ? -cur.dir : 1;
      return { ...prev, [tableId]: { col, dir } };
    });
  }

  function filterRows(rows) {
    const q = search.trim().toLowerCase();
    return rows.filter(r => {
      if (q) {
        const hay = (config.searchKeys || Object.keys(r)).map(k => r[k]).join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      for (const f of (config.filters || [])) {
        const sel = filters[f.name];
        if (!sel || sel === 'All') continue;
        const rowField = (config.filterMatch && config.filterMatch[f.name]) || f.name;
        const rv = r[rowField];
        if (rv === undefined || rv === null) continue;
        if (String(rv).toLowerCase() !== String(sel).toLowerCase()) return false;
      }
      return true;
    });
  }

  // Scope: either a string (legacy `scope_en`) or a structured object `scope_obj`.
  const scopeStr = data['scope_' + lang] || data.scope_en || (typeof data.scope === 'string' ? data.scope : '') || '';
  const scopeObj = (data.scope && typeof data.scope === 'object') ? data.scope :
                   (data['scope_obj_' + lang] || data.scope_obj || null);
  const title = (config.title && (config.title[lang] || config.title.en)) || '';
  const subtitle = (config.subtitle && (config.subtitle[lang] || config.subtitle.en)) || '';

  const totalRows = (config.tables || []).reduce((sum, tbl) => sum + ((data.tables && data.tables[tbl.id]) || []).length, 0);
  const visibleRows = (config.tables || []).reduce((sum, tbl) => sum + filterRows((data.tables && data.tables[tbl.id]) || []).length, 0);

  return (
    <div className="min-h-screen">
      <header className="panel border-b sticky top-0 z-20 header-shell">
        <div className="w-full px-6 py-3 flex items-center justify-between gap-4 flex-wrap">
          <div className="flex items-center gap-4 min-w-0">
            <ZscalerLogo />
            <div className="h-6 w-px bg-[var(--zs-border-strong)]" />
            <div className="text-sm font-medium text-[var(--zs-text)] truncate">{title}</div>
          </div>
          <div className="flex items-center gap-2 no-print">
            {data.incident && <span className="incident-pill">⚡ {t('activeIncident')}</span>}
            <LanguageMenu lang={lang} onChange={setLang} t={t} />
            <ThemeToggle theme={theme} onToggle={() => setTheme(theme === 'dark' ? 'light' : 'dark')} t={t} />
            <button onClick={() => window.print()} className="btn-primary">{t('printSavePdf')}</button>
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-6 py-8">
        <section className="mb-6">
          <h1 className="text-3xl md:text-4xl font-bold mb-2 tracking-tight">
            <span className="grad-text">{title}</span>
          </h1>
          <div className="text-[var(--zs-muted)] text-sm">{subtitle}</div>
          {scopeStr && !scopeObj && <div className="text-[var(--zs-muted)] text-xs mt-2"><span className="text-[var(--zs-text)] font-medium">{t('scope')}:</span> {scopeStr}</div>}
          {data.generated_at && <div className="text-[var(--zs-muted)] text-xs mt-1"><span className="text-[var(--zs-text)] font-medium">{t('generatedAt')}:</span> {data.generated_at}</div>}
        </section>

        <ScopeBar scope={scopeObj} t={t} />
        <IncidentBanner incident={data.incident} />

        <section className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
          {(config.kpis || []).map(kpi => (
            <KpiCard key={kpi.key} kpi={kpi} raw={data.kpis && data.kpis[kpi.key]} t={t} />
          ))}
        </section>

        <section className="panel rounded-xl p-5 mb-6 no-print">
          <div className="space-y-4">
            <div>
              <div className="section-h">{t('search')}</div>
              <input
                className="search-input"
                placeholder={t('search') + '…'}
                value={search}
                onChange={e => setSearch(e.target.value)}
              />
            </div>
            {(config.filters || []).map(f => (
              <div key={f.name}>
                <div className="section-h">{t(f.labelKey)}</div>
                <div className="flex flex-wrap gap-2">
                  {f.options.map(([val, _label, labelKey]) => (
                    <button
                      key={val}
                      className={'filter-chip ' + (filters[f.name] === val ? 'active' : '')}
                      onClick={() => setFilter(f.name, val)}
                    >
                      {t(labelKey)}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </section>

        <div className="text-xs uppercase tracking-wide text-[var(--zs-muted)] mb-3 no-print flex items-center justify-between">
          <span>{t('showing')} {visibleRows} {t('of')} {totalRows} {t('rows')}</span>
        </div>

        {(config.tables || []).map(tableSpec => {
          const rawRows = (data.tables && data.tables[tableSpec.id]) || [];
          const filtered = filterRows(rawRows);
          const sorted = sortRows(tableSpec, filtered);
          return (
            <div key={tableSpec.id}>
              <div className="flex items-center justify-end mb-2 no-print">
                <button className="filter-chip" onClick={() => exportCSV(tableSpec, sorted, t)}>{t('export')}</button>
              </div>
              <DataTable
                tableSpec={tableSpec}
                rows={sorted}
                sortState={sortByTable[tableSpec.id]}
                onSort={(col) => onSort(tableSpec.id, col)}
                t={t}
                columnOverrides={(data.columnOverrides && data.columnOverrides[tableSpec.id]) || null}
              />
            </div>
          );
        })}

        <AnalysisSection analysis={data.analysis} t={t} />

        <footer className="mt-12 pt-6 border-t border-[var(--zs-border)] text-xs text-[var(--zs-muted)] text-center">
          {t('footer')} · <code className="font-mono">{config.id}</code>
        </footer>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
