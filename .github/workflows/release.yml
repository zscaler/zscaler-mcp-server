---
name: Release

on:
  push:
    branches:
      - master
      - develop
  pull_request:

permissions:
  contents: write
  pull-requests: write
  issues: write


jobs:

  lint-checks:
    name: Lint Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          activate-environment: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint imports with Ruff
        run: ruff check . --select I

      - name: Lint with Ruff
        run: ruff check .

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e
        with:
          config: '.markdownlint.json'
          globs: |
            README.md
            docs/**/*.md

  release:
    name: Release
    if: github.event_name == 'push' && github.ref != 'refs/heads/develop'
    needs: lint-checks
    runs-on: ubuntu-latest
    # Surface semantic-release outputs at the job level so the downstream
    # mcp-registry-publish job can gate on whether a release actually happened.
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          activate-environment: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Create release and publish
        id: release
        uses: cycjimmy/semantic-release-action@v2
        with:
          semantic_version: 17.1.1
          extra_plugins: |
            conventional-changelog-conventionalcommits@^4.4.0
            @semantic-release/git@^9.0.0
            @semantic-release/exec@^5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  # ---------------------------------------------------------------------------
  # MCP Registry Publish
  # ---------------------------------------------------------------------------
  # After every successful release, push the freshly-bumped server.json to
  # the canonical MCP Registry at https://registry.modelcontextprotocol.io
  # so downstream catalogs (GitHub MCP Registry, MCP-aware clients) see the
  # new version without manual intervention.
  #
  # Auth: GitHub OIDC — no PAT or long-lived token. The minimal permissions
  # block (id-token: write, contents: read) is scoped to this job only and
  # does not affect the rest of the workflow's permissions.
  #
  # Failure here is non-fatal for the release itself — PyPI / GitHub release
  # are already done by the time this job runs. Operators can fall back to
  # the manual `mcp-publisher publish` flow documented in
  # integrations/github/README.md.
  mcp-registry-publish:
    name: Publish to MCP Registry
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          # Check out the tag the release job just created so the published
          # server.json matches the version users see on PyPI / GitHub.
          ref: v${{ needs.release.outputs.new_release_version }}

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json
        run: ./mcp-publisher publish

  # ---------------------------------------------------------------------------
  # MCPB Bundle Build, Sign & Attach
  # ---------------------------------------------------------------------------
  # After every successful release, build the cross-platform Claude Desktop
  # (.mcpb) bundle, sign it with the project's PGP key, and attach it to the
  # GitHub Release semantic-release just created.
  #
  # WHY THIS LIVES HERE (and not solely in mcpb-build.yml's release trigger):
  # GitHub deliberately suppresses workflow events raised by the built-in
  # GITHUB_TOKEN to prevent recursive runs. Because semantic-release publishes
  # the GitHub Release using GITHUB_TOKEN, the `release: published` event never
  # triggers a separate workflow. Chaining this job off the `release` job —
  # within the same workflow run — sidesteps that suppression entirely and
  # guarantees the bundle is attached automatically on every release.
  #
  # mcpb-build.yml still exists as a standalone workflow for manual
  # re-attachment (workflow_dispatch) and PR dry-runs; its build/sign logic is
  # intentionally mirrored here so the happy path needs no manual step.
  #
  # Gated on new_release_published so non-release pushes (and develop) are
  # skipped. Failure here is non-fatal for the release itself — PyPI / GitHub
  # release / MCP Registry are already done; operators can re-run via
  # `gh workflow run mcpb-build.yml -f tag=vX.Y.Z`.
  mcpb-bundle-attach:
    name: Build, sign & attach .mcpb
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # upload release assets
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          # Build from the exact tag the release job just created so the
          # bundle's version matches PyPI / GitHub / the MCP Registry.
          ref: v${{ needs.release.outputs.new_release_version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          activate-environment: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Set up Node (for mcpb pack via npx)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build the .mcpb bundle
        run: uv run python scripts/build_mcpb.py --output-dir dist

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Sign the bundle (detached PGP signature + SHA-256 checksum)
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          PASSPHRASE: ${{ secrets.PASSPHRASE }}
        run: |
          set -euo pipefail
          VERSIONED=$(ls dist/zscaler-mcp-server-*.mcpb | head -n1)
          echo "Signing $VERSIONED with key $GPG_FINGERPRINT"
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$PASSPHRASE" \
            --local-user "$GPG_FINGERPRINT" \
            --detach-sign --armor \
            --output "${VERSIONED}.asc" \
            "$VERSIONED"
          ( cd dist && shasum -a 256 "$(basename "$VERSIONED")" > "$(basename "$VERSIONED").sha256" )
          gpg --verify "${VERSIONED}.asc" "$VERSIONED"
          ( cd dist && shasum -a 256 -c "$(basename "$VERSIONED").sha256" )
          echo "Signature and checksum verified."

      - name: Attach bundle + signature to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.release.outputs.new_release_version }}"
          VERSIONED=$(ls dist/zscaler-mcp-server-*.mcpb | head -n1)
          echo "Attaching $VERSIONED (+ .asc, .sha256) to release $TAG"
          gh release upload "$TAG" \
            "$VERSIONED" "${VERSIONED}.asc" "${VERSIONED}.sha256" \
            --clobber

      - name: Job summary
        run: |
          echo "## Claude Desktop (.mcpb) Bundle" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release:** v${{ needs.release.outputs.new_release_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Signed with key:** ${{ steps.import_gpg.outputs.fingerprint }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ls -lh dist/zscaler-mcp-server-*.mcpb dist/*.asc dist/*.sha256 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Docker Versioned Image Publish
  # ---------------------------------------------------------------------------
  # After every successful release, build the multi-platform Docker image from
  # the release tag and push the immutable + rolling semver tags
  # (X.Y.Z, X.Y, and X once the major version is > 0) to Docker Hub.
  #
  # WHY THIS LIVES HERE (and not in docker-build-push.yml's release trigger):
  # same GITHUB_TOKEN event-suppression as mcpb-bundle-attach above — the
  # `release: published` trigger in a standalone workflow never fires for
  # releases that semantic-release publishes with GITHUB_TOKEN. The semver tag
  # config that previously lived in docker-build-push.yml was dead code for
  # exactly that reason (no versioned tag was ever pushed). Chaining the build
  # off the `release` job sidesteps the suppression, mirroring PR #78.
  #
  # docker-build-push.yml still exists as a standalone workflow: it builds
  # `latest` on every master push and offers a workflow_dispatch path to
  # backfill versioned tags for an existing release.
  #
  # Failure here is non-fatal for the release itself — PyPI / GitHub release /
  # MCP Registry are already done; operators can backfill via
  # `gh workflow run docker-build-push.yml -f tag=vX.Y.Z`.
  docker-image-publish:
    name: Publish versioned Docker image
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write          # Required for provenance attestation signing
    steps:
      - name: Checkout release tag
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          # Build from the exact tag the release job just created so the
          # image's version matches PyPI / GitHub / the MCPB bundle.
          ref: v${{ needs.release.outputs.new_release_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      - name: Log in to Docker Hub
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive rolling version tags
        id: ver
        run: |
          set -euo pipefail
          VERSION="${{ needs.release.outputs.new_release_version }}"
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          {
            echo "version=${VERSION}"
            echo "major_minor=${MAJOR}.${MINOR}"
            echo "major=${MAJOR}"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f
        with:
          images: zscaler/zscaler-mcp-server
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=${{ steps.ver.outputs.major_minor }}
            type=raw,value=${{ steps.ver.outputs.major }},enable=${{ steps.ver.outputs.major != '0' }}
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.title=Zscaler Integrations MCP Server
            org.opencontainers.image.description=Model Context Protocol server for Zscaler API
            org.opencontainers.image.vendor=Zscaler
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/zscaler/zscaler-mcp-server
            org.opencontainers.image.documentation=https://github.com/zscaler/zscaler-mcp-server/blob/main/README.md

      - name: Build and push Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Job summary
        run: |
          echo "## 🐳 Versioned Docker Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release:** v${{ needs.release.outputs.new_release_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Registry:** docker.io/zscaler/zscaler-mcp-server" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Platforms:** linux/amd64, linux/arm64" >> "$GITHUB_STEP_SUMMARY"
          echo "**Attestations:** SBOM + Provenance (max)" >> "$GITHUB_STEP_SUMMARY"
