name: MCPB Build Test

# Single PR workflow that keeps the auto-generated docs/manifest in sync AND
# validates the Claude Desktop (.mcpb) bundle, in that order, so one run both
# fixes and verifies (no flip-flop between a separate regen workflow and a
# separate validation workflow).
#
# Flow on every PR:
#   1. Regenerate the auto-generated files (MCPB manifest, supported-tools.md,
#      toolset catalog, README service summary) from the live tool inventory.
#      If anything changed, commit it back to the PR branch — removes the
#      manual `make generate-docs` step for same-repo branches.
#   2. Build + validate the bundle against the now-fresh manifest (mirrors
#      docker-build-test.yml: build WITHOUT attaching/signing, then smoke test).
#
# What step 2 guards against (all things mcpb-build.yml would otherwise only
# discover at release time):
#   * a stale committed manifest (out of sync with the live tool inventory)
#   * server.type drifting away from "uv" (would ship a platform-locked bundle)
#   * `mcpb pack` failing manifest / icon validation
#   * the bundle regaining its pre-uv bloat (size ceiling check)
#
# Loop safety: the regen commit pushes with the default GITHUB_TOKEN, whose
# pushes deliberately do NOT re-trigger `pull_request` workflows, and carries
# `[skip ci]` — so it commits once and stops. Fork PRs get a read-only token
# and can't be pushed to; there the regen step is skipped and the `--check-docs`
# step still fails loudly, telling the contributor to run `make generate-docs`.

on:
  pull_request:
    branches: [master]
    paths:
      - 'zscaler_mcp/**'
      - 'integrations/anthropic/manifest.json'
      - 'docs/guides/supported-tools.md'
      - 'docs/guides/toolsets.md'
      - 'README.md'
      - 'scripts/build_mcpb.py'
      - '.mcpbignore'
      - 'pyproject.toml'
      - 'assets/icon.png'
      - 'tests/test_mcpb.py'
      - '.github/workflows/mcpb-build-test.yml'
  workflow_dispatch:

permissions:
  contents: write   # push regenerated docs/manifest back to the PR branch

jobs:
  mcpb-build-test:
    name: Regenerate, build & validate .mcpb
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Determine if PR is from a fork
        id: fork
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
          fi

      # For same-repo PRs check out the head branch (so we can push the regen
      # back); for forks / workflow_dispatch fall back to the default checkout.
      - name: Checkout PR head branch (same-repo)
        if: steps.fork.outputs.is_fork == 'false' && github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code (fork / dispatch)
        if: steps.fork.outputs.is_fork == 'true' || github.event_name != 'pull_request'
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          activate-environment: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Set up Node (for mcpb pack via npx)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --- Step 1: keep generated files in sync (zero-touch) ---------------
      - name: Regenerate auto-generated docs + manifest
        run: uv run python -m zscaler_mcp.server --generate-docs

      - name: Commit + push regenerated files if stale (same-repo only)
        if: steps.fork.outputs.is_fork == 'false' && github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          # Only the files the generator owns — never sweep in unrelated changes.
          GENERATED_PATHS=(
            "integrations/anthropic/manifest.json"
            "docs/guides/supported-tools.md"
            "docs/guides/toolsets.md"
            "README.md"
          )

          if git diff --quiet -- "${GENERATED_PATHS[@]}"; then
            echo "Generated docs already in sync — nothing to commit."
          else
            echo "Generated docs were stale; committing regenerated files:"
            git --no-pager diff --stat -- "${GENERATED_PATHS[@]}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- "${GENERATED_PATHS[@]}"
            git commit -m "chore(docs): regenerate auto-generated docs + MCPB manifest [skip ci]"
            git push origin HEAD:"${{ github.event.pull_request.head.ref }}"
            echo "Pushed regenerated docs to ${{ github.event.pull_request.head.ref }}."
          fi

      # --- Step 2: validate (against the now-fresh manifest) ---------------
      - name: MCPB unit tests
        run: uv run pytest tests/test_mcpb.py -q

      - name: Verify generated manifest is in sync
        run: uv run python -m zscaler_mcp.server --check-docs

      - name: Build the .mcpb bundle (no attach / no sign)
        run: uv run python scripts/build_mcpb.py --output-dir dist

      - name: Smoke-validate the bundle
        run: |
          set -euo pipefail

          BUNDLE=$(ls dist/zscaler-mcp-server-*.mcpb | head -n1)
          if [ -z "$BUNDLE" ] || [ ! -f "$BUNDLE" ]; then
            echo "::error::No .mcpb produced in dist/"
            exit 1
          fi
          echo "Built: $BUNDLE"

          # A .mcpb is a zip archive — confirm it's structurally valid and
          # contains the manifest at the pack root. The anchored pattern
          # (whitespace + name + EOL) matches the root entry but not a
          # nested path like integrations/anthropic/manifest.json.
          unzip -l "$BUNDLE" >/dev/null
          if ! unzip -l "$BUNDLE" | grep -Eq '[[:space:]]manifest\.json$'; then
            echo "::error::Bundle is missing manifest.json at its root"
            exit 1
          fi

          # The uv-runtime bundle is source-only and must stay lean. The
          # broken pre-uv (pip --target) bundle was ~31 MB; a regression
          # back to vendoring compiled wheels would blow past this ceiling.
          MAX_BYTES=$((5 * 1024 * 1024))   # 5 MB hard ceiling (bundle is ~460 KB)
          SIZE=$(stat -c%s "$BUNDLE")
          echo "Bundle size: ${SIZE} bytes (ceiling ${MAX_BYTES})"
          if [ "$SIZE" -gt "$MAX_BYTES" ]; then
            echo "::error::Bundle is ${SIZE} bytes, over the ${MAX_BYTES}-byte ceiling. "
            echo "::error::This usually means dependencies got vendored (server.type left uv) "
            echo "::error::or a large directory slipped past .mcpbignore."
            exit 1
          fi

          # mcpb's own validation pass (manifest schema + icon).
          npx @anthropic-ai/mcpb@latest info "$BUNDLE"

          echo "✅ MCPB bundle smoke tests passed!"

      - name: Upload bundle as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcpb-build-test
          path: dist/*.mcpb
          if-no-files-found: ignore
