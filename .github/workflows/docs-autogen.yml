name: Auto-generate docs

# Zero-touch regeneration of every auto-generated file (the MCPB manifest at
# integrations/anthropic/manifest.json, docs/guides/supported-tools.md, the
# README service summary, and the toolset catalog) on pull requests.
#
# Why this exists: those files are derived from the live tool inventory in
# zscaler_mcp/services.py. Add / rename / remove a tool and they go stale.
# Rather than relying on contributors to remember `make generate-docs`, this
# workflow runs the generator on every PR and, if anything changed, commits
# the result straight back to the PR branch.
#
# Safety / loop prevention:
#   * Pushes use the default GITHUB_TOKEN, whose pushes deliberately do NOT
#     re-trigger `pull_request` workflows — so this commits once and stops,
#     no infinite CI loop.
#   * It only commits when there is an actual diff (no-op when already in sync,
#     e.g. the author ran `make generate-docs` locally).
#   * Fork PRs get a read-only token and can't be pushed to; that's fine — the
#     `--check-docs` step in tests.yml still fails loudly there, so a fork
#     contributor is told to run `make generate-docs` themselves. The seatbelt
#     remains; this workflow just removes the manual step for the common
#     (same-repo branch) case.

on:
  pull_request:
    branches: [master]
    paths:
      - 'zscaler_mcp/**'
      - 'integrations/anthropic/manifest.json'
      - 'docs/guides/supported-tools.md'
      - 'docs/guides/toolsets.md'
      - 'README.md'
      - '.github/workflows/docs-autogen.yml'

permissions:
  contents: write   # push regenerated files back to the PR branch

jobs:
  autogen:
    name: Regenerate + commit generated docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          # Check out the PR head branch (not the merge ref) so we can push
          # the regenerated files back to it. Use the token so the push is
          # authenticated.
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          activate-environment: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Regenerate auto-generated docs
        run: uv run python -m zscaler_mcp.server --generate-docs

      - name: Commit + push if anything changed
        run: |
          set -euo pipefail

          # Only the files the generator owns. Scoping the commit to these
          # paths means an unrelated change that happens to sit in the working
          # tree is never swept into the bot commit.
          GENERATED_PATHS=(
            "integrations/anthropic/manifest.json"
            "docs/guides/supported-tools.md"
            "docs/guides/toolsets.md"
            "README.md"
          )

          if git diff --quiet -- "${GENERATED_PATHS[@]}"; then
            echo "Generated docs already in sync — nothing to commit."
            exit 0
          fi

          echo "Generated docs were stale; committing regenerated files:"
          git --no-pager diff --stat -- "${GENERATED_PATHS[@]}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${GENERATED_PATHS[@]}"
          git commit -m "chore(docs): regenerate auto-generated docs + MCPB manifest [skip ci]"
          git push origin HEAD:"${{ github.event.pull_request.head.ref }}"
          echo "Pushed regenerated docs to ${{ github.event.pull_request.head.ref }}."
